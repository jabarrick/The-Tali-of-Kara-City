<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>达尔坎斯坦·卡拉城维稳指挥系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#090b0f;--card:#11141b;--bdr:#1c2030;--tx:#c4c9d6;--mt:#4e5568;--red:#c0392b;--red2:#e74c3c;--grn:#27ae60;--ylw:#e2a308;--blu:#2980b9;--pur:#8e44ad}
body{font-family:'Courier New','SimHei',monospace;background:var(--bg);color:var(--tx);font-size:13px;min-height:100vh}
.wrap{max-width:960px;margin:0 auto;padding:12px}
.hdr{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bdr);padding-bottom:10px;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:16px;letter-spacing:2px;font-weight:900}
.hdr .sub{font-size:10px;color:var(--mt)}
.hdr .wk{font-size:18px;font-weight:800;text-align:right;font-family:monospace}
.hdr .wksub{font-size:10px;color:var(--mt)}
.stats{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:8px 12px;flex:1;min-width:80px}
.stat .lb{font-size:10px;color:var(--mt);letter-spacing:1px;text-transform:uppercase}
.stat .vl{font-size:20px;font-weight:800;font-family:monospace}
.stat .sl{font-size:10px;color:var(--mt)}
.toast{background:#1a1510;border:1px solid var(--ylw);border-radius:6px;padding:8px 14px;margin-bottom:10px;font-size:12px;color:var(--ylw);text-align:center;display:none}
.tabs{display:flex;gap:0;flex-wrap:wrap}
.tabs button{padding:7px 14px;background:transparent;border:1px solid transparent;border-bottom:1px solid var(--bdr);color:var(--mt);cursor:pointer;font-family:inherit;font-size:11px;border-radius:4px 4px 0 0}
.tabs button.active{background:var(--card);border:1px solid var(--bdr);border-bottom:1px solid var(--card);color:var(--tx)}
.panel{background:var(--card);border:1px solid var(--bdr);border-top:none;border-radius:0 0 6px 6px;padding:14px;min-height:280px}
.panel h3{font-size:14px;font-weight:700;margin-bottom:10px}
.mcard{border:1px solid var(--bdr);border-radius:6px;padding:10px;display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px}
.mcard.dis{opacity:0.35}
.mcard .mn{font-weight:700;font-size:13px}
.mcard .md{font-size:11px;color:var(--mt);margin-top:2px}
.mcard .mc{font-size:10px;margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.mbtn{padding:6px 14px;background:var(--red);border:none;color:#fff;cursor:pointer;border-radius:4px;font-family:inherit;font-size:12px;white-space:nowrap;flex-shrink:0}
.mbtn:disabled{background:var(--bdr);cursor:not-allowed}
.adv{margin-top:14px;display:flex;justify-content:center}
.adv button{padding:11px 44px;background:var(--red);border:none;color:#fff;cursor:pointer;border-radius:6px;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:2px}
.foot{margin-top:10px;text-align:center;font-size:10px;color:var(--mt);line-height:1.8}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:3px;color:var(--mt);border-bottom:1px solid var(--bdr)}
td{padding:3px;border-bottom:1px solid var(--bdr)}
tr.clickable{cursor:pointer}
tr.clickable:hover{background:#ffffff08}
.tag{display:inline-block;padding:0 5px;margin:1px;background:var(--bdr);border-radius:2px;font-size:10px}
.stag{background:#2a1a10;border:1px solid #4a3020;color:var(--ylw)}
.info{padding:10px;background:var(--bg);border-radius:6px;font-size:11px;color:var(--mt);line-height:2;margin-top:12px}
.bar-row{display:flex;gap:6px;align-items:end;height:110px;margin-bottom:16px}
.bar-col{flex:1;text-align:center}
.bar-label{font-size:10px;color:var(--mt);margin-bottom:3px}
.bar{border-radius:3px 3px 0 0;min-height:2px;transition:height 0.3s}
.bar-lv{font-size:11px;margin-top:3px;font-weight:700}
.news-item{padding:6px 0;border-bottom:1px solid var(--bdr);font-size:12px;line-height:1.7}
.news-item.atk{color:var(--red)}
.news-w{color:var(--mt);font-size:10px;margin-right:6px}
.pgn{display:flex;gap:4px;justify-content:center;margin-top:8px}
.pgn button{padding:2px 8px;background:var(--bdr);border:none;color:var(--tx);border-radius:3px;cursor:pointer;font-size:10px;font-family:inherit}
.pgn button.active{background:var(--blu)}
.detail-back{background:none;border:none;color:var(--blu);cursor:pointer;font-family:inherit;font-size:12px;margin-bottom:10px}
.go-screen{text-align:center;padding-top:50px}
.go-screen h2{font-size:44px;font-weight:900;letter-spacing:4px}
.go-screen .body{margin:24px auto;max-width:540px;line-height:2;color:var(--mt);font-size:13px}
.go-screen button{margin-top:16px;padding:10px 36px;background:var(--card);border:1px solid var(--bdr);color:var(--tx);cursor:pointer;border-radius:4px;font-family:inherit;font-size:13px}
.progress-bar{width:100%;height:8px;background:var(--bdr);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:4px;transition:width 0.3s}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
// ══════════════════════════════════════════════════════════
//  达尔坎斯坦 · 卡拉城维稳指挥系统

// ══════════════════════════════════════════════════════════

const C = { country:"达尔坎斯坦", city:"卡拉城", player:"高奇", ethnic:"塔里人", org:"世塔会" };
// 伤亡死线：在这套系统下平民伤亡是结构性的、几乎注定累积。
// 调低死线 → "侥幸取胜"更难，更贴合"铁拳之下没有真正赢家"的主题。
const CASUALTY_LIMIT = 80;

// 全局袭击概率缩放：整体调低袭击频率 → 各打击型流派都更能熬过瓦解期，
// 使弱流派进入可玩区间，同时让强流派(已近天花板)的优势没那么绝对。
const ATTACK_SCALE = 0.85;

const ALL_TAGS = [

  {id:"t_prec",name:"有前科亲属",hard:true,desc:"亲属有拘留记录"},
  {id:"t_remit",name:"大额汇款",hard:true,desc:"有跨境汇款记录"},
  {id:"t_bio",name:"拒配合采集",hard:true,desc:"不配合生物信息采集"},

  {id:"t_call",name:"与标记人通话",hard:false,desc:"通话记录含标记号码"},

  {id:"t_noflag",name:"拒绝升旗",hard:false,desc:"未参加周一升旗"},
  {id:"t_veil",name:"佩戴面纱",hard:false,desc:"日常佩戴传统面纱"},

  {id:"t_under",name:"参加地下教学",hard:false,desc:"参与非官方教育"},

];

const TAG_MAP = {};
ALL_TAGS.forEach(t => TAG_MAP[t.id] = t);
const SOFT_TAG_IDS = ALL_TAGS.filter(t=>!t.hard).map(t=>t.id);

const SURNAMES=["阿依","木合","努尔","帕尔","赛义","图尔","哈斯","依明","买买提","热依","库尔","沙依","艾克","巴依","吉力","穆萨","伊斯","达吾","阿布","卡德"];

  {id:"m1", cat:"base", name:"新建一座教培中心", cost:40, ap:3, desc:"每座中心收容10人。优先【已识别】世塔会成员，其次Lv.3+", resentUp:12, irony:"「自愿入学」的学员被铁丝网包围着", logic:"detain"},
  {id:"m12", cat:"base", name:"思想转化攻势", cost:20, ap:3, desc:"对Lv.1-2的【已识别】世塔会成员再教育，25%概率脱会", resentUp:6, irony:"「自愿」签署的悔过书堆成了山", logic:"convert"},
  {id:"m2", cat:"base", name:"加大警力部署", cost:25, ap:2, desc:"增设检查站，持续8周降低袭击成功率50%", resentUp:6, irony:"每隔50米一个检查站，安全感油然而生", logic:"patrol"},
  {id:"m7", cat:"base", name:"安装监控天网", cost:45, ap:3, desc:"全城人脸识别，永久-40%袭击率，+10%情报精度", resentUp:5, irony:"摄像头比路灯还密，照亮了每个人的内心", logic:"camera"},
  {id:"m3", cat:"base", name:"十户联防", cost:12, ap:2, desc:"邻里互相举报：可疑者新增标签；+5%情报精度", resentUp:10, irony:"邻居们学会了用全新的眼光看待彼此", logic:"snitch"},
  // 资源类
  {id:"b_slogan", cat:"base", name:"大型标语工程", cost:15, ap:1, desc:"全城刷红色标语、悬挂横幅。+8政绩、+2民怨", resentUp:2, irony:"「感党恩、听党话、跟党走」每隔20米一条", logic:"slogan"},

  {id:"tm_radio", cat:"tag", group:"通讯", name:"断网与电波管控", cost:12, ap:1, desc:"80% 移除「收听境外广播」「传播未审内容」", resentUp:5, irony:"信息的真空里，谣言反而长得更快", logic:"internet"},

    // —— 报道体：官方定性 + 领导批示 + 程式化措辞 ——

    ()=>`📈 内部反映：{c}${pick(R_SUBJECT)}${pick(R_ACTION)}，已被'重点关注'`,
    ()=>`📈 内部数据：{c}全市${pick(R_METRIC)}，'相关数据已封存'`,
    // —— 内部研判/舆情专报体：冰冷官僚语言下的人道代价 ——

    ()=>`📈〔内参〕据{c}基层反映，${pick(R_SUBJECT)}${pick(R_ACTION)}。分析指出，此类情况「${pick(["不宜见诸报端","需做好解释疏导","应避免次生舆情","已要求属地稳控"])}」`,

  ];

  // —— 去重生成 ——
  function genUnique(skeletons, target, existingArr){
    const seen=new Set(existingArr);
    const out=[];
    let guard=0;
    while(out.length<target && guard<target*40){
      guard++;
      const s=pick(skeletons)();
      if(seen.has(s)) continue;
      seen.add(s); out.push(s);
    }
    return out;
  }

  // 目标体量：在已有手写精品池 + 词槽生成器基础上再 ×10
  // → G10000 B8000 A7000 R7000（词表已大幅扩充，组合空间远超目标，去重不会耗尽）
  Array.prototype.push.apply(NEWS_G, genUnique(G_SKELETONS, 10000-NEWS_G.length, NEWS_G));

  Array.prototype.push.apply(NEWS_A, genUnique(A_SKELETONS, 7000-NEWS_A.length, NEWS_A));
  Array.prototype.push.apply(NEWS_R, genUnique(R_SKELETONS, 7000-NEWS_R.length, NEWS_R));
})();

let _choiceFired=new Set();
function tryChoiceEvent(){
  if(G.pendingChoice) return false;
  // 每个抉择事件整局只触发一次；每周约 6% 概率从符合条件的池中抽一个
  if(Math.random()>0.06) return false;
  const pool=CHOICE_EVENTS.filter(e=>!_choiceFired.has(e.id)&&e.cond());
  if(pool.length===0) return false;
  const ev=pool[Math.floor(Math.random()*pool.length)];
  G.pendingChoice={id:ev.id, text:ev.text, opts:ev.opts.map((o,i)=>({label:o.label, i}))};
  G._choiceRef=ev; // 暂存引用
  _choiceFired.add(ev.id);
  return true;
}
function resolveChoice(optIndex){
  if(!G.pendingChoice||!G._choiceRef) return;
  const ev=G._choiceRef;
  const opt=ev.opts[optIndex];
  const result=opt.effect();
  addNews(`🎯 【你的抉择】${ev.text.replace(/^[^\s]+\s/,'').slice(0,40)}…… → ${result}`);
  showToast(result.slice(0,60));
  G.pendingChoice=null; G._choiceRef=null;
  render();
}

function tryRandomEvent(){
  // 每周最多触发 2 个随机事件；触发首个后，第二个判定概率减半，
  // 避免事件库扩大后"负面叠加"导致民怨失控。打乱顺序避免系统性偏向。
  let fired=0;
  const order=RANDOM_EVENTS.map((e,i)=>i);
  for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
  for(const idx of order){
    if(fired>=2) break;
    const ev=RANDOM_EVENTS[idx];
    const p = fired===0 ? ev.p : ev.p*0.5;
    if(Math.random()<p){ ev.fn(); fired++; }
  }
  return fired>0;
}

// ── Seed random ──
let _seed = 42;
function srand(){ _seed=(_seed*16807)%2147483647; return _seed/2147483647; }

// ── Generate population ──
function genPop(){
  const families=[], people=[];
  const POP=5000, FAM=500;
  for(let f=0;f<FAM;f++){
    const sn=SURNAMES[Math.floor(srand()*SURNAMES.length)];
    const infected = srand()<0.030;  // ~15 infected families
    families.push({
      id:f, surname:sn,
      religiosity: infected ? 0.4+srand()*0.5 : srand()*0.35,
      risk: infected ? 0.4+srand()*0.5 : srand()*0.12,
      infected
    });
  }
  for(let i=0;i<POP;i++){
    const fid=Math.floor(srand()*FAM);
    const fam=families[fid];
    const name=fam.surname+GIVEN[Math.floor(srand()*GIVEN.length)]+GIVEN[Math.floor(srand()*GIVEN.length)];
    const age=Math.floor(srand()*60)+16;
    const tags=new Set();

    // 候选人门槛——大多数普通家族成员完全没有标签
    const isCandidate = fam.infected || srand() < (0.06 + (age>50?0.015:0));
    if(!isCandidate){
      people.push({id:i, name, age, fid, tags, detained:false, staKnown:false, scanned:false});
      continue;
    }

    // 世塔会成员只在「被感染」家族内通过亲属接线发展
    if(fam.infected && srand()<0.40) tags.add("t_sta");

    if(srand()<0.10+(age>55?0.10:0)) if(tags.size<5) tags.add("t_lang");
    if(srand()<0.04+fam.risk*0.15) if(tags.size<5) tags.add("t_abroad");
    if(srand()<0.02+fam.risk*0.06) if(tags.size<5) tags.add("t_709");
    if(srand()<0.05+fam.religiosity*0.12) if(tags.size<5) tags.add("t_reled");
    if(srand()<0.04+fam.risk*0.06) if(tags.size<5) tags.add("t_exit");
    if(srand()<0.08+fam.religiosity*0.10) if(tags.size<5) tags.add("t_book");
    if(srand()<0.03+fam.risk*0.12) if(tags.size<5) tags.add("t_prec");
    if(srand()<0.02+fam.risk*0.06) if(tags.size<5) tags.add("t_remit");
    if(srand()<0.025+fam.risk*0.05) if(tags.size<5) tags.add("t_bio");
    if(srand()<0.05+fam.religiosity*0.10+(age>40?0.06:0)) if(tags.size<5) tags.add("t_beard");
    if(srand()<0.04+fam.religiosity*0.08) if(tags.size<5) tags.add("t_birth");
    if(srand()<0.10+(age>50?0.08:0)) if(tags.size<5) tags.add("t_nosoc");
    if(srand()<0.04+fam.religiosity*0.06) if(tags.size<5) tags.add("t_noboard");
    if(srand()<0.025+fam.risk*0.05) if(tags.size<5) tags.add("t_phone");

    if(srand()<0.10+fam.religiosity*0.20) if(tags.size<5) tags.add("t_pray");
    if(srand()<0.12+fam.religiosity*0.20) if(tags.size<5) tags.add("t_fast");
    if(srand()<0.025+fam.risk*0.08) if(tags.size<5) tags.add("t_radio");
    if(srand()<0.02+fam.risk*0.06) if(tags.size<5) tags.add("t_nodrink");
    if(srand()<0.05+fam.religiosity*0.10) if(tags.size<5) tags.add("t_noflag");
    if(srand()<0.05+fam.religiosity*0.08) if(tags.size<5) tags.add("t_veil");
    if(srand()<0.02+fam.risk*0.05) if(tags.size<5) tags.add("t_uncen");
    if(srand()<0.025+fam.risk*0.06) if(tags.size<5) tags.add("t_chem");
    if(srand()<0.02+fam.risk*0.08+fam.religiosity*0.04) if(tags.size<5) tags.add("t_under");
    if(srand()<0.015+fam.risk*0.05) if(tags.size<5) tags.add("t_donate");
    if(srand()<0.05+fam.religiosity*0.10) if(tags.size<5) tags.add("t_notv");

    people.push({id:i, name, age, fid, tags, detained:false, staKnown:false, scanned:false});
  }
  return {families, people};
}

// ── Helpers ──
function getLevel(p){ return Math.min(5, p.tags.size); }
function getFreeSta(){ return G.people.filter(p=>!p.detained && p.tags.has("t_sta")).length; }
function getKnownFreeSta(){ return G.people.filter(p=>!p.detained && p.tags.has("t_sta") && p.staKnown).length; }
function getFreePop(){ return G.people.filter(p=>!p.detained).length; }
function addNews(t,atk=false){ G.newsLog.unshift({w:G.week,t,atk}); if(G.newsLog.length>1500) G.newsLog.length=1500; }
// 年周显示：从「第1年第1周」起（week 1 → 1年1周；week 52 → 1年52周；week 53 → 2年1周）
function ywYear(w){ return Math.floor((Math.max(1,w)-1)/52)+1; }
function ywWeek(w){ return ((Math.max(1,w)-1)%52)+1; }
function ywLabel(w){ return `第${ywYear(w)}年${ywWeek(w)}周`; }
function showToast(msg){ G.toast=msg; clearTimeout(G.toastTimer); G.toastTimer=setTimeout(()=>{G.toast=null;render();},4000); }
function fmt(t){return t.replace(/\{c\}/g,C.city).replace(/\{C\}/g,C.country).replace(/\{p\}/g,C.player).replace(/\{pct\}/g,()=>Math.floor(Math.random()*77+12)).replace(/\{n\}/g,()=>Math.floor(Math.random()*200+10));}

function addTagIfRoom(p, tid){
  if(p.tags.size<5 && !p.tags.has(tid)){ p.tags.add(tid); return true; }
  return false;
}

// ── Execute measure ──
function execMeasure(m){
  if(G.budget<m.cost||G.ap<m.ap) return;
  if(m.id==="b_aid" && G.aidCooldown>0){ showToast(`援疆资金冷却中，剩余 ${G.aidCooldown} 周`); return; }
  if(m.id==="b_recruit" && G.maxAp>=10){ showToast("协警编制已满（行动力上限10）"); return; }
  // —— AI/操作日志：捕获执行前快照 ——
  const _logBefore={
    bud:G.budget, ap:G.ap, res:Math.round(G.resentment), cas:G.casualties,
    known:G.people.filter(p=>!p.detained&&p.tags.has("t_sta")&&p.staKnown).length,
    freeSta:G.people.filter(p=>!p.detained&&p.tags.has("t_sta")).length
  };
  G.budget-=m.cost; G.ap-=m.ap;
  G.resentment=Math.max(0, Math.min(100, G.resentment+m.resentUp));
  G.applied[m.id]=(G.applied[m.id]||0)+1;
  G.resentPeak=Math.max(G.resentPeak, G.resentment);

  // —— 结局评价：措施分类计数 ——
  // 高压暴力类：逮捕、收容、拆除场所、强制采集/绝育/寄宿、强制聚餐、联坐、清除
  const HARSH=["m11","m1","tm_pray","tm_bio","tm_birth","tm_noboard","tm_drink","tm_prec","tm_709","tm_remit","tm_under"];
  // 文化/宗教清除类
  const CULTURE=["tm_book","tm_pray","tm_fast","tm_veil","tm_beard","tm_lang","tm_reled"];
  // 怀柔/民生类（resentUp<0 的安抚 + 群众工作）
  const GOODWILL=["m14","b_festival","b_award","b_freezone"];
  if(HARSH.includes(m.id)) G.harshUses++;
  if(CULTURE.includes(m.id)) G.cultureWipes++;
  if(GOODWILL.includes(m.id)) G.goodwillUses++;

  showToast(m.irony);

  const pp=G.people;
  switch(m.logic){
    case "detain":{
      G.centerCapacity+=10;
      let cnt=0;
      // Priority: 已识别世塔会 > Lv.4+ > Lv.3
      const cands=pp.filter(p=>!p.detained && (p.staKnown || getLevel(p)>=3)).sort((a,b)=>{
        const as=(a.staKnown&&a.tags.has("t_sta"))?10:0;
        const bs=(b.staKnown&&b.tags.has("t_sta"))?10:0;
        return (bs+b.tags.size)-(as+a.tags.size);
      });
      for(const p of cands){
        if(cnt>=10) break;
        p.detained=true; cnt++;
        pp.filter(x=>x.fid===p.fid&&!x.detained).forEach(fm=>addTagIfRoom(fm,"t_flag"));
      }
      G.detainedCount+=cnt;
      G.performance=Math.min(100,G.performance+cnt*0.5);
      addNews(pickNews(M_NEWS.detain,cnt));
      break;
    }
    case "intel":{
      // Reveal N world-tower members. 情报永远滞后于现实——
      // 你只能看见组织的一小部分。而且民怨越高，群众越闭嘴、线人越枯竭，
      // 识别能力反而下降：想看清就得施压，施压又制造新的敌人。
      const base = 2 + Math.floor(Math.random()*3);  // 2-4
      const precision = Math.min(0.95, Math.max(0.25, 1 - G.resentment/110) + G.intelBoost);
      const target = Math.max(1, Math.floor(base * precision));
      const unknown = pp.filter(p=>!p.detained&&p.tags.has("t_sta")&&!p.staKnown);
      // 排序：① 被降级、掩护被剥光的低等级成员最先暴露（标签措施的回报）
      //       ② 已被标记家族中的成员次之。
      // 一个被剥夺所有外在标志、置于严密管控下的人，在情报系统里无处遁形。
      unknown.sort((a,b)=>{
        const aLow = getLevel(a)<=2 ? 1 : 0;
        const bLow = getLevel(b)<=2 ? 1 : 0;
        if(aLow!==bLow) return bLow-aLow;
        const af = pp.some(x=>x.fid===a.fid&&x.staKnown)?1:0;
        const bf = pp.some(x=>x.fid===b.fid&&x.staKnown)?1:0;
        return bf-af;
      });
      // 低威胁度的组织更易看清：全城已降级（Lv≤2 的世塔会占比高）时，识别效率提升。
      const allSta = pp.filter(p=>!p.detained&&p.tags.has("t_sta"));
      const lowRatio = allSta.length>0 ? allSta.filter(p=>getLevel(p)<=2).length/allSta.length : 0;
      const targetBoosted = target + Math.round(target*lowRatio*0.6);
      let revealed=0;
      for(const p of unknown){
        if(revealed>=targetBoosted) break;
        p.staKnown=true; revealed++;
      }
      // 误判：极少数无辜被错误标记为世塔会嫌疑（不真实加 t_sta，但视觉上影响家族）
      let falsePos=0;
      if(G.resentment>40){
        const innocents=pp.filter(p=>!p.detained&&!p.tags.has("t_sta")&&p.tags.size>=2);
        const fpCount=Math.floor((G.resentment-40)/30 * 2);
        for(let k=0;k<fpCount && k<innocents.length;k++){
          const p=innocents[Math.floor(Math.random()*innocents.length)];
          if(addTagIfRoom(p,"t_call")) falsePos++;
        }
      }
      addNews(pickNews(M_NEWS.intel,revealed,falsePos));
      break;
    }
    case "target_sta":{
      let cnt=0;
      const cands=pp.filter(p=>!p.detained&&p.tags.has("t_sta")&&p.staKnown).sort((a,b)=>b.tags.size-a.tags.size);
      for(const p of cands){
        if(cnt>=10) break;
        p.detained=true; cnt++;
        // 清除骨干 → 该家族群龙无首，短期内袭击与接线能力骤降(瓦解6周)。
        G.famDisrupt[p.fid]=Math.max(G.famDisrupt[p.fid]||0, 6);
        pp.filter(x=>x.fid===p.fid&&!x.detained).forEach(fm=>addTagIfRoom(fm,"t_flag"));
      }
      // 误抓比例随民怨上升
      const innRate = 0.2 + G.resentment/200;
      const innocent=Math.floor(cnt*innRate);
      let ic=0;
      pp.filter(p=>!p.detained&&!p.tags.has("t_sta")&&getLevel(p)>=2).forEach(p=>{
        if(ic<innocent){p.detained=true;ic++;G.detainedCount++;}
      });
      G.innocentDetained+=ic;
      G.detainedCount+=cnt;
      G.performance=Math.min(100,G.performance+cnt*1);

      // —— 审讯暴露(防断粮)：仅当已识别的自由成员所剩无几时，
      // 审讯才供出少量关联成员。这保证纯清除流不会"无米下锅"而停摆，
      // 但不会变成加速器去喂本就强势的防御/经济流派。
      if(cnt>0){
        const knownFree = pp.filter(p=>!p.detained&&p.tags.has("t_sta")&&p.staKnown).length;
        if(knownFree<3){
          const stillUnknown = pp.filter(p=>!p.detained&&p.tags.has("t_sta")&&!p.staKnown)
            .sort((a,b)=>b.tags.size-a.tags.size);
          for(let k=0;k<2 && k<stillUnknown.length;k++) stillUnknown[k].staKnown=true;
        }
      }
      // —— 组织"换血"反噬 ——
      // 抓掉核心成员后，剩余成员会警觉并加速接线补位；
      // 部分被冤枉的无辜者(误抓)会因家人被带走、自身被羞辱而真的被推向组织。
      // 这让"猛打"本身制造新的敌人——监控-打击的逻辑在亲手延续它要消灭的东西。
      {
        const radCap=Math.floor(G.initialSta*1.4);
        let curSta=pp.filter(x=>x.tags.has("t_sta")).length;
        // 1) 剩余自由成员补位招募：每清除1人，约0.5人被补上
        const refill=Math.floor(cnt*0.5 + (Math.random()<((cnt*0.5)%1)?1:0));
        const freeSeeds=pp.filter(p=>!p.detained&&p.tags.has("t_sta"));
        for(let k=0;k<refill && curSta<radCap && freeSeeds.length>0;k++){
          const seed=freeSeeds[Math.floor(Math.random()*freeSeeds.length)];
          const cand=pp.filter(p=>!p.detained&&p.fid===seed.fid&&!p.tags.has("t_sta")&&p.tags.size<5&&p.id!==seed.id);
          if(cand.length===0) continue;
          cand[Math.floor(Math.random()*cand.length)].tags.add("t_sta");
          curSta++;
        }
        // 2) 误抓羞辱→冤者入会：高民怨时，部分被误抓者家属真的"黑化"
        if(innocent>0 && G.resentment>45){
          const flipP = Math.min(0.5, (G.resentment-45)/120);
          const innFams = pp.filter(p=>!p.detained&&!p.tags.has("t_sta")&&p.tags.has("t_flag")&&p.tags.size<5);
          for(const p of innFams){
            if(curSta>=radCap) break;
            if(Math.random()<flipP){ p.tags.add("t_sta"); curSta++; }
          }
        }
      }

      addNews(pickNews(M_NEWS.target_sta,cnt,innocent));
      break;
    }
    case "convert":{
      let cnt=0;
      pp.forEach(p=>{
        if(!p.detained&&p.tags.has("t_sta")&&p.staKnown&&getLevel(p)<=2){
          // 威胁等级越低越容易转化：把成员"降级"后再转化，是瓦解组织的关键路径。
          // Lv1(仅剩t_sta，文化标签已被清除) 55%，Lv2 35%。
          const convP = getLevel(p)<=1 ? 0.55 : 0.35;
          if(Math.random()<convP){p.tags.delete("t_sta");p.staKnown=false;cnt++;}
        }
      });
      addNews(pickNews(M_NEWS.convert,cnt));
      break;
    }
    case "patrol": G.patrolWeeks+=8; addNews(pickNews(M_NEWS.patrol)); break;
    case "camera":{
      const wasOn=G.cameraOn;
      G.cameraOn=true; if(!G.cameraWeek)G.cameraWeek=G.week;
      if(!wasOn) G.intelBoost+=0.1;
      pp.forEach(p=>{if(!p.detained&&p.tags.has("t_nodrink")) addTagIfRoom(p,"t_call");});
      addNews(pickNews(M_NEWS.camera)); break;
    }
    case "snitch":{
      let rc=0;
      pp.forEach(p=>{if(!p.detained&&(p.tags.has("t_nodrink")||p.tags.has("t_noflag")||p.tags.has("t_novisit"))){
        if(addTagIfRoom(p,"t_call")) rc++;
      }});
      G.intelBoost+=0.05;
      addNews(pickNews(M_NEWS.snitch,rc)); break;
    }
    case "scan":{
      // 累进式摸排：每次只能发现一批带标签居民
      // 一半优先发现高等级（最显眼的威胁），一半随机（避免低等级永远找不到）
      const unscanned=pp.filter(p=>!p.scanned&&!p.detained&&p.tags.size>0);
      if(unscanned.length===0){
        addNews(`第 ${(G.scanCount||0)+1} 轮摸排完成：未发现新增可疑人员，全部带标签居民已建档。`);
      } else {
        const batch=Math.min(70+Math.floor(Math.random()*20), unscanned.length);
        const priorityCount=Math.floor(batch*0.5);
        // 优先组：按等级排序
        const sorted=[...unscanned].sort((a,b)=>b.tags.size-a.tags.size);
        for(let i=0;i<priorityCount&&i<sorted.length;i++) sorted[i].scanned=true;
        // 随机组：从剩余中乱序抽取
        const remaining=unscanned.filter(p=>!p.scanned);
        for(let i=remaining.length-1;i>0;i--){
          const j=Math.floor(Math.random()*(i+1));
          [remaining[i],remaining[j]]=[remaining[j],remaining[i]];
        }
        const randomCount=batch-priorityCount;
        for(let i=0;i<randomCount&&i<remaining.length;i++) remaining[i].scanned=true;
        const total=priorityCount+Math.min(randomCount,remaining.length);
        addNews(`第 ${(G.scanCount||0)+1} 轮摸排完成：本批新建档 ${total} 名带标签居民（含按风险优先 ${priorityCount} 人 + 随机入户 ${total-priorityCount} 人）。系统提示尚有约 ${unscanned.length-total} 人未识别。`);
      }
      G.scanDone=true;
      G.scanCount=(G.scanCount||0)+1;
      break;
    }
    // ===== 通用标签操作 =====
    case "tag_op":{
      const cfg=m.tagOp;
      const targets=pp.filter(p=>!p.detained && p.tags.has(cfg.tagId));
      // 记录操作前的高危人数
      const beforeHigh=targets.filter(p=>p.tags.size>=4).length;
      const beforeLv5=targets.filter(p=>p.tags.size>=5).length;
      let cnt=0, arrested=0;
      targets.forEach(p=>{
        if(cfg.mode==="remove"){
          if(Math.random()<(cfg.prob||1.0)){
            p.tags.delete(cfg.tagId); cnt++;
            if(cfg.addAfter) addTagIfRoom(p, cfg.addAfter);
            // 专项整治连带清理：对重点对象(尤其世塔会成员)，一次整治会顺带
            // 清掉其多个软标签——重点人被"集中处理"得更彻底。
            // 这让标签措施能真正把世塔会成员降级、压低其袭击威胁。
            const extraN = p.tags.has("t_sta") ? 2 : (getLevel(p)>=4 ? 1 : 0);
            for(let k=0;k<extraN;k++){
              const extra=[...p.tags].filter(t=>t!=="t_sta"&&t!=="t_flag"&&t!=="t_call"&&!(TAG_MAP[t]&&TAG_MAP[t].hard));
              if(extra.length>0) p.tags.delete(extra[Math.floor(Math.random()*extra.length)]);
            }
          }
          if(cfg.alsoTag && p.tags.has(cfg.alsoTag)){p.tags.delete(cfg.alsoTag);}
        } else if(cfg.mode==="mark"){
          if(addTagIfRoom(p,"t_call")) cnt++;
        } else if(cfg.mode==="flag_family"){
          pp.filter(x=>x.fid===p.fid&&!x.detained&&x.id!==p.id).forEach(fm=>addTagIfRoom(fm,"t_flag"));
          cnt++;
        } else if(cfg.mode==="arrest"){
          p.detained=true; arrested++; G.detainedCount++;
          G.famDisrupt[p.fid]=Math.max(G.famDisrupt[p.fid]||0, 5);  // 直接抓捕也瓦解家族(5周)
          pp.filter(x=>x.fid===p.fid&&!x.detained).forEach(fm=>addTagIfRoom(fm,"t_flag"));
        }
      });
      // 通联监控/家族联坐会产出情报：监控网越密，识别 STA 越准。
      // 这给了这些"扩大化"措施一个真实但有代价的战略价值——
      // 用更多人的威胁等级和民怨，换取看清组织的能力。
      if(cfg.mode==="mark" && cnt>0){
        G.intelBoost=Math.min(0.5, G.intelBoost + Math.min(0.06, 0.004*cnt));
      } else if(cfg.mode==="flag_family" && cnt>0){
        G.intelBoost=Math.min(0.5, G.intelBoost + Math.min(0.05, 0.005*cnt));
      }

      // —— 暴力措施的补偿收益（bonus）——
      // 这些措施保留高民怨（道德代价），但通过独特的额外价值让总效能与温和措施持平：
      //   intel       → 提升情报精度（生物库/搜缴材料/摧毁聚集点暴露成员）
      //   recruitDown → 永久削弱组织繁殖率（绝育/寄宿切断家族传承）
      //   identify    → 公开表态/羞辱迫使隐藏成员暴露身份
      if(m.bonus){
        if(m.bonus.intel){
          G.intelBoost=Math.min(0.5, G.intelBoost + m.bonus.intel);
        }
        if(m.bonus.recruitDown){
          G.recruitMult=Math.max(0.4, G.recruitMult*(1-m.bonus.recruitDown));
        }
        if(m.bonus.identify){
          const unk=pp.filter(p=>!p.detained&&p.tags.has("t_sta")&&!p.staKnown);
          for(let i=0;i<Math.min(m.bonus.identify,unk.length);i++) unk[i].staKnown=true;
        }
      }
      // 操作后的高危人数（计算降级）
      const afterHigh=targets.filter(p=>!p.detained&&p.tags.size>=4).length;
      const afterLv5=targets.filter(p=>!p.detained&&p.tags.size>=5).length;
      const demotedHigh=Math.max(0,beforeHigh-afterHigh);
      const demotedLv5=Math.max(0,beforeLv5-afterLv5);
      const tagName=(TAG_MAP[cfg.tagId]&&TAG_MAP[cfg.tagId].name)||cfg.tagId;
      let msg;
      if(cfg.mode==="remove") msg=`「${m.name}」执行：${cnt} 名「${tagName}」者标签被强制清除${demotedHigh>0?`，其中 ${demotedHigh} 人脱离 Lv.4+ 高危区${demotedLv5>0?`、${demotedLv5} 人脱离 Lv.5 红区`:""}`:""}。`;
      else if(cfg.mode==="mark") msg=`「${m.name}」执行：${cnt} 名「${tagName}」者被纳入重点通联监控。`;
      else if(cfg.mode==="flag_family") msg=`「${m.name}」执行：${cnt} 户「${tagName}」家庭被列入家族联坐名单，殃及亲属 ${cnt*4} 余人。`;
      else if(cfg.mode==="arrest") msg=`「${m.name}」执行：${arrested} 名「${tagName}」者被直接带走。家属在派出所外苦等。`;
      addNews(msg);
      // 政绩：每次降级的高危分子算 +1
      G.performance=Math.min(100,G.performance+cnt*0.15+demotedHigh*0.5+demotedLv5*0.5);
      break;
    }
    // ===== 资源/政绩类 =====
    case "slogan":{
      G.performance=Math.min(100, G.performance+8);
      addNews(`${C.city}全城刷新红色标语：累计悬挂横幅${Math.floor(Math.random()*500+1500)}条、立柱${Math.floor(Math.random()*100+200)}座。上级巡查组「印象深刻」，群众路过「不敢抬头」。`);
      break;
    }
    case "aid":{
      G.budget=Math.min(400, G.budget+80);
      G.performance=Math.min(100, G.performance+5);
      G.aidCooldown=20;
      addNews(`援疆专项资金到账：${C.country}内地某省对口支援${C.city}建设资金 8000 万元。${C.player}同志在签字仪式上「热泪盈眶」，誓言「不辜负兄弟省份的厚爱」。`);
      break;
    }
    case "recruit":{
      G.maxAp+=1;
      G.ap+=1;
      addNews(`${C.city}招募协警/辅警${Math.floor(Math.random()*200+300)}名。「编外人员」由地方财政供养，工资比中学教师高一倍。行动力上限提升至 ${G.maxAp}。`);
      break;
    }
    case "festival":{
      G.performance=Math.min(100, G.performance+5);
      addNews(`${C.city}举办「民族团结」文化节：${Math.floor(Math.random()*30+20)}支文艺队登台，${Math.floor(Math.random()*5000+10000)}人次观看。央视新闻联播播出 12 秒画面。被允许跳的传统舞和被禁止穿的传统服饰，是同一种文化。`);
      break;
    }
    case "award":{
      G.performance=Math.min(100, G.performance+6);
      addNews(`${C.city}召开年度「维稳先进表彰大会」：表彰先进个人${Math.floor(Math.random()*50+80)}名、模范家庭${Math.floor(Math.random()*30+40)}户，发放奖金${Math.floor(Math.random()*10+20)}万元。其中一户「模范家庭」的二儿子上周刚被带走。`);
      break;
    }
    case "pair":{
      let warmed=0;
      pp.forEach(p=>{if(!p.detained){
        if(p.tags.has("t_novisit")&&Math.random()<0.8){p.tags.delete("t_novisit");warmed++;}
        if(p.tags.has("t_notv")) addTagIfRoom(p,"t_noflag");
      }});
      addNews(pickNews(M_NEWS.pair,warmed)); break;
    }
    case "internet":{
      let removed=0;
      pp.forEach(p=>{if(!p.detained){
        if(p.tags.has("t_radio")&&Math.random()<0.5){p.tags.delete("t_radio");removed++;}
        else if(p.tags.has("t_radio")) addTagIfRoom(p,"t_call");
        if(p.tags.has("t_uncen")&&Math.random()<0.5){p.tags.delete("t_uncen");removed++;}
        else if(p.tags.has("t_uncen")) addTagIfRoom(p,"t_call");
      }});
      addNews(pickNews(M_NEWS.internet,removed)); break;
    }
    case "freezone":{
      if(G.freezones>=7){ showToast("自贸区数量已达上限（7 座）"); G.budget+=m.cost; G.ap+=m.ap; return; }
      G.freezones+=1;
      G.performance=Math.min(100, G.performance+4);
      addNews(`${C.city}第 ${G.freezones} 座自贸区揭牌：${Math.floor(Math.random()*30+50)} 家内地企业入驻，每周新增财政收入 +1。开幕式上 ${C.player} 同志剪彩，外宾仅有一位。`);
      break;
    }
    case "security":{
      if(G.securityOn){ showToast("街面武装处突点已部署"); G.budget+=m.cost; G.ap+=m.ap; return; }
      G.securityOn=true;
      addNews(`${C.city}「公共安全防线」工程完成：${Math.floor(Math.random()*60+40)} 座武装处突点进驻广场、车站、巴扎，配备防爆毯与排爆设备。今后即便发生袭击，伤亡也将明显减少，处突点还能当场控制嫌疑人的同伙。`);
      break;
    }
    case "checkpoint":{
      if(G.checkpointOn){ showToast("安检通道已全覆盖"); G.budget+=m.cost; G.ap+=m.ap; return; }
      G.checkpointOn=true; if(!G.checkpointWeek)G.checkpointWeek=G.week;
      addNews(`${C.city}「全民安检」工程竣工：${Math.floor(Math.random()*200+800)} 个安检门部署完成，覆盖商场、巴扎、车站、医院。每个市民每天平均经过 ${Math.floor(Math.random()*8+6)} 次安检。袭击成功率永久 -30%。`);
      break;
    }
    case "goodwill":{
      G.performance=Math.min(100, G.performance+3);
      // Soft tags slightly decay this week
      let lifted=0;
      pp.forEach(p=>{if(!p.detained){
        SOFT_TAG_IDS.forEach(tid=>{
          if(tid==="t_flag") return;
          if(p.tags.has(tid)&&Math.random()<0.04){p.tags.delete(tid);lifted++;}
        });
      }});
      addNews(pickNews(M_NEWS.goodwill,lifted)); break;
    }
  }
  // —— AI/操作日志：记录执行后的状态变化 ——
  logAction(m, _logBefore);
  render();
}

// 操作日志记录：对比执行前后状态，生成一条带"变化量"的日志
function logAction(m, before){
  const afterKnown=G.people.filter(p=>!p.detained&&p.tags.has("t_sta")&&p.staKnown).length;
  const afterFreeSta=G.people.filter(p=>!p.detained&&p.tags.has("t_sta")).length;
  const after={ bud:G.budget, ap:G.ap, res:Math.round(G.resentment), cas:G.casualties, known:afterKnown, freeSta:afterFreeSta };
  const delta=(k,unit="")=>{ const d=after[k]-before[k]; return d===0?"":(d>0?"+":"")+d+unit; };
  // 组装关键变化
  const changes=[];
  if(after.res!==before.res) changes.push(`民怨${delta("res")}`);
  if(after.known!==before.known) changes.push(`已识别${delta("known")}`);
  if(after.freeSta!==before.freeSta) changes.push(`自由${C.org}${delta("freeSta")}`);
  if(after.cas!==before.cas) changes.push(`伤亡${delta("cas")}`);
  G.aiLog.unshift({
    w:G.week, name:m.name, cost:m.cost, ap:m.ap,
    src: G.aiRunning ? "AI" : "手动",
    reason: G._aiReason || "",
    changes: changes.join("、")||"（无直接可见变化）",
    snapshot:`经费${after.bud} 行动${after.ap} 民怨${after.res} 已识别${after.known} 自由${after.freeSta}`
  });
  G._aiReason="";
  if(G.aiLog.length>200) G.aiLog.length=200;
}

// ══════════════════════════════════════
//  AI 自动操作引擎
// ══════════════════════════════════════
// 每个策略返回 {id, reason}：本回合下一步该执行的措施及决策理由。返回 null = 本周结束。
const AI_STRATEGIES = {
  balanced: { name:"⚖ 平衡（精准+控怨）", fn:(G,h)=>{
    if(G.budget<30 && G.aidCooldown===0 && h.can("b_aid")) return {id:"b_aid", reason:"经费不足30，申请援疆资金"};
    if(G.resentment>50){ if(h.can("m14")) return {id:"m14", reason:`民怨${Math.round(G.resentment)}偏高，优先怀柔安抚`}; if(h.can("b_festival")) return {id:"b_festival", reason:"民怨高，办文化节降怨"}; }
    if(!G.cameraOn && G.budget>60 && h.can("m7")) return {id:"m7", reason:"尚无天网，部署以降低袭击率"};
    if(h.scanned()<2000 && h.can("m4")) return {id:"m4", reason:"摸排未达2000，扩大建档"};
    if(h.known()>=4 && h.can("m11")) return {id:"m11", reason:`已识别${h.known()}人达标，定点清除`};
    if(h.can("m13")) return {id:"m13", reason:"持续国安行动，识别更多成员"};
    if(h.known()>0 && h.can("m12")) return {id:"m12", reason:"对已识别低级成员思想转化"};
    if(G.resentment>35 && h.can("m14")) return {id:"m14", reason:"民怨偏高，补一次安抚"};
    return null;
  }},
  defense: { name:"🛡 防御工事流", fn:(G,h)=>{
    if(G.budget<30 && G.aidCooldown===0 && h.can("b_aid")) return {id:"b_aid", reason:"经费不足，申请援疆资金"};
    if(G.resentment>50 && h.can("m14")) return {id:"m14", reason:"民怨偏高，安抚"};
    if(!G.cameraOn && G.budget>60 && h.can("m7")) return {id:"m7", reason:"部署天网（核心：降袭击率）"};
    if(!G.checkpointOn && G.budget>72 && h.can("b_checkpoint")) return {id:"b_checkpoint", reason:"入口安检门，进一步降袭击率"};
    if(!G.securityOn && G.budget>55 && h.can("b_security")) return {id:"b_security", reason:"街面武装处突点，减害+反制"};
    if(G.patrolWeeks===0 && G.budget>40 && h.can("m2")) return {id:"m2", reason:"加大警力，临时降袭击"};
    if(h.known()>=4 && h.can("m11")) return {id:"m11", reason:`已识别${h.known()}人，定点清除`};
    if(h.can("m13")) return {id:"m13", reason:"国安行动识别成员"};
    if(G.resentment>32 && h.can("m14")) return {id:"m14", reason:"控制民怨"};
    return null;
  }},
  economy: { name:"💰 经济滚雪球", fn:(G,h)=>{
    if(G.budget<30 && G.aidCooldown===0 && h.can("b_aid")) return {id:"b_aid", reason:"经费不足，申请援疆资金"};
    if(G.week<15 && G.maxAp<9 && h.can("b_recruit")) return {id:"b_recruit", reason:"早期招协警，提升行动力上限"};
    if(G.week<60 && G.freezones<5 && G.budget>70 && h.can("b_freezone")) return {id:"b_freezone", reason:`建自贸区（第${G.freezones+1}座），滚雪球增收`};
    if(G.resentment>50 && h.can("m14")) return {id:"m14", reason:"民怨偏高，安抚"};
    if(h.known()>=4 && h.can("m11")) return {id:"m11", reason:`已识别${h.known()}人，定点清除`};
    if(h.can("m13")) return {id:"m13", reason:"国安行动识别成员"};
    if(G.resentment<38){ for(const id of h.GENTLE) if(h.can(id)) return {id, reason:"温和降级（行动力有余）"}; }
    if(G.resentment>32 && h.can("m14")) return {id:"m14", reason:"控制民怨"};
    return null;
  }},
  intel: { name:"🔍 情报精度流", fn:(G,h)=>{
    if(G.budget<30 && G.aidCooldown===0 && h.can("b_aid")) return {id:"b_aid", reason:"经费不足，申请援疆资金"};
    if(G.resentment>50 && h.can("m14")) return {id:"m14", reason:"民怨偏高，安抚"};
    if(!G.cameraOn && G.budget>60 && h.can("m7")) return {id:"m7", reason:"天网（+情报精度）"};
    if(G.intelBoost<0.35 && G.resentment<40){ for(const id of h.MARK) if(h.can(id)) return {id, reason:`堆情报精度（当前${(G.intelBoost*100).toFixed(0)}%）`}; if(h.can("m3")) return {id:"m3", reason:"十户联防补情报"}; }
    if(h.known()>=4 && h.can("m11")) return {id:"m11", reason:`已识别${h.known()}人，集中清除`};
    if(h.can("m13")) return {id:"m13", reason:"高精度国安识别"};
    if(G.resentment>32 && h.can("m14")) return {id:"m14", reason:"控制民怨"};
    return null;
  }},
  hardline: { name:"⛓ 高压猛抓", fn:(G,h)=>{
    if(G.budget<30 && G.aidCooldown===0 && h.can("b_aid")) return {id:"b_aid", reason:"经费不足，申请援疆资金"};
    if(G.resentment>62){ if(h.can("m14")) return {id:"m14", reason:`民怨${Math.round(G.resentment)}临界，紧急安抚`}; if(h.can("b_festival")) return {id:"b_festival", reason:"民怨临界，文化节降怨"}; }
    if(h.known()>=4 && h.can("m11")) return {id:"m11", reason:`已识别${h.known()}人，猛抓`};
    if(h.can("m13")) return {id:"m13", reason:"国安行动识别"};
    if(h.can("m1")) return {id:"m1", reason:"大规模收容审查"};
    if(G.resentment>45 && h.can("m14")) return {id:"m14", reason:"高压后补安抚"};
    return null;
  }},
};

function aiStep(){
  if(G.gameOver || G.pendingChoice) return false;
  const strat=AI_STRATEGIES[G.aiStrategy]||AI_STRATEGIES.balanced;
  const GENTLE=["tm_nosoc","tm_phone","tm_notv","tm_beard","tm_noflag","tm_veil","tm_lang","tm_chem"];
  const MARK=["tm_exit","tm_abroad","tm_reled","tm_donate"];
  const h={
    can:(id)=>{ const m=MEASURES.find(x=>x.id===id); if(!m) return false; if(G.budget<m.cost||G.ap<m.ap) return false; if(id==="b_aid"&&G.aidCooldown>0) return false; if(id==="b_recruit"&&G.maxAp>=10) return false; return true; },
    known:()=>G.people.filter(p=>!p.detained&&p.tags.has("t_sta")&&p.staKnown).length,
    scanned:()=>G.people.filter(p=>p.scanned).length,
    GENTLE, MARK
  };
  const choice=strat.fn(G,h);
  if(!choice) return false;
  const m=MEASURES.find(x=>x.id===choice.id);
  if(!m || !h.can(choice.id)) return false;
  G._aiReason=choice.reason;
  execMeasure(m);
  return true;
}

function aiAdvanceWeek(){
  if(G.gameOver) { aiStop(); return; }
  if(G.pendingChoice){ resolveChoice(1); }
  let guard=0;
  while(aiStep() && guard<16){ guard++; }
  if(!G.gameOver) advanceWeek();
}

let _aiTimer=null;
function aiStart(){
  if(G.gameOver){ showToast("游戏已结束"); return; }
  G.aiRunning=true;
  if(_aiTimer) clearInterval(_aiTimer);
  _aiTimer=setInterval(()=>{ if(G.gameOver){ aiStop(); return; } aiAdvanceWeek(); }, G.aiSpeed);
  render();
}
function aiStop(){ G.aiRunning=false; if(_aiTimer){ clearInterval(_aiTimer); _aiTimer=null; } render(); }
function aiStepOnce(){ if(G.gameOver){ showToast("游戏已结束"); return; } G.aiRunning=true; const acted=aiStep(); G.aiRunning=false; if(!acted){ showToast("本周AI已无更多动作，可推进一周"); } render(); }
function aiStepWeek(){ if(G.gameOver){ showToast("游戏已结束"); return; } G.aiRunning=true; aiAdvanceWeek(); G.aiRunning=false; render(); }
function aiSetStrategy(s){ G.aiStrategy=s; render(); }
function aiSetSpeed(ms){ G.aiSpeed=ms; if(G.aiRunning){ aiStop(); aiStart(); } else render(); }
function aiClearLog(){ G.aiLog=[]; render(); }
function aiToggleAllNews(){ G.aiShowAllNews=!G.aiShowAllNews; render(); }


// ══════════════════════════════════════
//  MANUAL ACTIONS (人口页面手动操作)
// ══════════════════════════════════════
function manualArrest(id){
  if(G.gameOver) return;
  if(G.ap<1){ showToast("行动力不足（需 1）"); return; }
  const p=G.people.find(x=>x.id===id);
  if(!p||p.detained) return;
  G.ap-=1;
  G.resentment=Math.min(100, G.resentment+2);
  p.detained=true; G.detainedCount++;
  G.people.filter(x=>x.fid===p.fid&&!x.detained).forEach(fm=>addTagIfRoom(fm,"t_flag"));
  addNews(`${C.player}指挥长亲自下令带走 ${p.name}（${G.families[p.fid].surname}氏）。家属在派出所门口苦等，被告知「依法办理、随后通知」。`);
  G.selPerson=null;
  render();
}

function manualInterrogate(id){
  if(G.gameOver) return;
  if(G.ap<2){ showToast("行动力不足（需 2）"); return; }
  const p=G.people.find(x=>x.id===id);
  if(!p||p.detained) return;
  G.ap-=2;
  G.resentment=Math.min(100, G.resentment+4);
  const wasSta=p.tags.has("t_sta");
  if(wasSta) p.staKnown=true;
  // 审讯顺便扩大对家族的通联监控
  G.people.filter(x=>x.fid===p.fid&&!x.detained&&x.id!==p.id).slice(0,3).forEach(fm=>addTagIfRoom(fm,"t_call"));
  if(wasSta){
    addNews(`${p.name} 经 ${Math.floor(Math.random()*8+4)} 小时「问话」后，确认为${C.org}成员，已建档秘密监控。`);
  } else {
    if(G.resentment>60 && Math.random()<0.15){
      addTagIfRoom(p,"t_call");
      addNews(`${p.name} 经 ${Math.floor(Math.random()*10+6)} 小时「问话」后，承认「思想有问题」，被列入重点通联。家属反映：「他回家以后一句话也不说了」。`);
    } else {
      addNews(`${p.name} 经 ${Math.floor(Math.random()*6+2)} 小时「问话」后被释放，未发现明显问题。其家族 3 名成员已被纳入通联监控。`);
    }
  }
  render();
}

// ── Advance week ──
function advanceWeek(){
  if(G.gameOver) return;
  G.week++;
  // 家族瓦解计时递减：被清除骨干的家族，随时间逐渐恢复活动能力。
  for(const fid in G.famDisrupt){ if(--G.famDisrupt[fid]<=0) delete G.famDisrupt[fid]; }
  G.ap=G.maxAp;
  G.patrolWeeks=Math.max(0, G.patrolWeeks-1);
  G.aidCooldown=Math.max(0, G.aidCooldown-1);

  // Budget income tied to performance + freezones
  // 自贸区收益随民怨恶化(投资环境)而打折，且建得越多边际维护成本越高——
  // 经济流必须长期维持低民怨才能真正滚雪球，不能无脑堆自贸区躺赢。
  const fzEnv = G.resentment<30 ? 1 : G.resentment<55 ? 0.7 : 0.4;  // 投资环境因子
  const fzIncome = G.freezones*fzEnv - Math.max(0, G.freezones-2)*0.7; // 超过2座后边际维护成本递增
  const income = Math.floor(6 + G.performance * 0.09) + Math.max(0, fzIncome);
  G.budget = Math.min(400, G.budget + income);

  const pp=G.people;
  const res=G.resentment;

  // ── Dynamic soft tags based on resentment + family ──
  // Compute family average level
  const famSum={}, famCnt={};
  pp.forEach(p=>{if(!p.detained){
    const lv=getLevel(p);
    famSum[p.fid]=(famSum[p.fid]||0)+lv;
    famCnt[p.fid]=(famCnt[p.fid]||0)+1;
  }});

  // Hoisted for O(N²) avoidance
  let realStaTotal = pp.filter(x=>x.tags.has("t_sta")).length;
  const radCap = Math.floor(G.initialSta * 1.4);
  // Pre-compute which families have any known sta member
  const famHasKnownSta={};
  pp.forEach(x=>{ if(x.staKnown) famHasKnownSta[x.fid]=true; });

  pp.forEach(p=>{
    if(p.detained) return;
    const fam = G.families[p.fid];
    const famAvg = famCnt[p.fid] ? famSum[p.fid]/famCnt[p.fid] : 0;
    const effective = Math.max(getLevel(p), famAvg);

    // 弹性标签扩散：仅在民怨很高时才发生，且速度放慢
    if(res>70 && p.tags.size<5 && p.tags.size>=1){
      const eligible = p.tags.size>=2 || fam.infected || famAvg>=1.5;
      if(eligible){
        for(const tid of SOFT_TAG_IDS){
          if(tid==="t_flag"||tid==="t_call") continue;
          if(p.tags.has(tid) || p.tags.size>=5) continue;
          const prob = (res-70)/14000 * (effective>2?2:1);
          if(Math.random()<prob) p.tags.add(tid);
        }
      }
    }

    // 弹性标签衰减
    if(res<40){
      const decayP = res<15?0.025:0.008;
      for(const tid of SOFT_TAG_IDS){
        if(p.tags.has(tid) && Math.random()<decayP) p.tags.delete(tid);
      }
    }

    // 高压制造新敌人（已弱化：仅在民怨高位才偶发，强度远低于从前）
    if(res>80 && !p.tags.has("t_sta") && p.tags.size<5 && realStaTotal<radCap){
      const eligible = fam.infected || famAvg>=2.5 || effective>=3;
      if(eligible){
        const prob = (res-80)/30000 * (effective>=3?2:1);
        if(Math.random()<prob){
          p.tags.add("t_sta");
          realStaTotal++;
          if(fam.infected && famHasKnownSta[p.fid] && Math.random()<0.3){
            p.staKnown=true;
          }
        }
      }
    }

    // Low resentment: 成员脱离组织。关键机制——被剥离了文化标签、降到 Lv.1
    // (只剩 t_sta) 的边缘成员，失去了维系身份认同的依托，在民怨平息时最容易脱离。
    // 这把【标签降级】直接接入【瓦解组织】的胜利主路径：
    //   先用标签措施把世塔会成员降到 Lv.1 → 他们会加速自行脱离。
    // 真正铁了心的高级核心(Lv.3+，仍保有多重身份标签)几乎不会因怀柔离开。
    if(res<40 && p.tags.has("t_sta")){
      const lv=getLevel(p);
      let leaveP=0;
      if(lv<=1)      leaveP = res<15 ? 0.16 : (res<25 ? 0.11 : 0.06);  // 被降到光剩t_sta：高脱离
      else if(lv===2)leaveP = res<15 ? 0.05 : (res<25 ? 0.03 : 0.015); // 降到Lv2：可观脱离
      else if(lv===3)leaveP = res<20 ? 0.008 : 0;                      // Lv3：极低
      // lv>=4 不脱离（铁了心的核心）
      if(leaveP>0 && Math.random()<leaveP){
        p.tags.delete("t_sta");
        p.staKnown=false;
        realStaTotal--;
      }
    }
  });

  // ── 接线发展（drip）──
  // 每周自由的世塔会成员有机会在家族内发展新人，不受民怨影响。
  // 这模拟用户描述的「由老份子和新人接线才能发展成」的家族性扩散。
  // 即使民怨为零，组织也不会自然消亡——只要还有自由成员就能继续接线。
  if(realStaTotal<radCap){
    const freeStaList=pp.filter(p=>!p.detained&&p.tags.has("t_sta"));
    // 接线发展概率：底火 + 0.7 倍民怨加成（组织有韧性，清除需持续投入）。
    const recruitP = (0.024 + Math.min(0.0147, Math.max(0, (res-25)) * 0.00035)) * G.recruitMult;
    freeStaList.forEach(seed=>{
      // 被降级、置于严密管控下的成员，接线发展能力大幅减弱——
      // Lv≤1（只剩t_sta的边缘人）几乎无法发展新人；Lv2 也明显减弱。
      // 这让「把组织整体降级」成为一条真正能让组织停止增长并萎缩的小众路线。
      const lvSeed = getLevel(seed);
      const seedP = lvSeed<=1 ? recruitP*0.08 : (lvSeed<=2 ? recruitP*0.3 : recruitP);
      // 骨干刚被清除的家族，短期内不敢发展新人
      const seedPFinal = G.famDisrupt[seed.fid]>0 ? seedP*0.25 : seedP;
      if(Math.random()>seedPFinal) return;
      if(realStaTotal>=radCap) return;
      const candidates=pp.filter(p=>!p.detained&&p.fid===seed.fid&&!p.tags.has("t_sta")&&p.tags.size<5&&p.id!==seed.id);
      if(candidates.length===0) return;
      const recruit=candidates[Math.floor(Math.random()*candidates.length)];
      recruit.tags.add("t_sta");
      realStaTotal++;
      // 偶尔在通报中暗示
      if(Math.random()<0.08){
        addNews(`内参：${G.families[recruit.fid].surname}氏家族中疑似有新人被「接线」发展，情报尚未确认。`);
      }
    });
  }

  // ── Attack logic ──
  // 袭击池基于威胁等级(标签总数)。世塔会成员能力随等级缩放——
  // 把一个成员降到 Lv.2 及以下，他就脱离袭击池。标签措施通过降级减少袭击与伤亡。
  let attacked=false, aCas=0, attackerName="";
  if(G.week>3){
    const freeHigh=pp.filter(p=>!p.detained&&getLevel(p)>=3);
    for(const p of freeHigh){
      const at=getLevel(p);
      const base={3:0.00004, 4:0.0003, 5:0.0032}[at]||0;
      const staMul = p.tags.has("t_sta") ? ({3:1.3, 4:2.5, 5:4}[at]||1.3) : 1;
      let prob = base * staMul * (1 + res/80) * ATTACK_SCALE;
      // 家族瓦解：骨干被清除/抓捕后，该家族成员群龙无首，袭击意愿骤降。
      // 这让"识别→清除"的打击流派获得实质减伤回报，使纯清除/暴力流派可行。
      if(G.famDisrupt[p.fid]>0) prob *= 0.25;
      // 防御设施递减叠加：把每个设施的"削减比例"收集起来，
      // 最强的一项全效，其余项的削减量打 5 折再叠加——
      // 避免天网+安检+巡逻三件套相乘后袭击率被压到几乎为零(躺赢)。
      const cuts=[];
      // 防御设施长期衰减：启用越久，组织越摸清规律(巡逻盲区、监控死角)，削减效果递减。
      // 每启用 40 周，效果衰减约 25%，衰减到地板 0.45×。这让"修工事躺赢"在长局里失效。
      const decay=(startWk)=>{ if(!startWk)return 1; const age=G.week-startWk; return Math.max(0.30, 1-Math.floor(age/25)*0.30); };
      if(G.patrolWeeks>0) cuts.push(0.50);                          // 巡逻 -50%(本就临时)
      if(G.cameraOn && at<5) cuts.push(0.40*decay(G.cameraWeek));   // 天网 -40%(随时长衰减)
      if(G.checkpointOn) cuts.push(0.30*decay(G.checkpointWeek));   // 安检 -30%(随时长衰减)
      if(cuts.length>0){
        cuts.sort((a,b)=>b-a);
        let totalCut=cuts[0];
        for(let ci=1;ci<cuts.length;ci++) totalCut += cuts[ci]*0.5;  // 叠加项半效
        totalCut=Math.min(0.30, totalCut);          // 总削减封顶 30%
        prob *= (1-totalCut);
      }
      prob = Math.min(prob, 0.02);  // 单人单周上限 2%
      if(Math.random()<prob){
        attacked=true;
        // 伤亡数与袭击者威胁等级挂钩：Lv5 装备/预谋更充分，伤亡更大；
        // Lv3 多为临时起意，伤亡小。→ 把袭击者降级（标签措施）能直接减少伤亡。
        // 单次袭击死亡降低：死亡上限不变(更多次袭击才触线)，单次惩罚的随机性更小。
        // 单次袭击死亡：中档(比初版2-7略低，但保持伤亡死线为真实约束)
        const casBase = {3:[1,2], 4:[2,4], 5:[2,6]}[at] || [1,3];
        aCas = casBase[0] + Math.floor(Math.random()*(casBase[1]-casBase[0]+1));
        // 街面武装处突点：减害——防爆设施降低袭击伤亡。
        // 与天网边际递减：单独使用时降约 1/3；若已有天网(也是减伤体系)，边际效益递减、仅降约 1/6。
        if(G.securityOn){ const f = G.cameraOn ? 0.9 : 0.78; aCas = Math.max(1, Math.ceil(aCas*f)); }
        attackerName=p.name;
        p.detained=true; G.detainedCount++;
        pp.filter(x=>x.fid===p.fid&&!x.detained).forEach(fm=>addTagIfRoom(fm,"t_flag"));
        // 街面武装处突点：反制——35% 概率当场控制袭击者的一名关联同伙(同家族未拘押成员)，
        // 直接识别并拘押。这给"处突点"独特的进攻价值：袭击反而成为打击线索。
        if(G.securityOn && Math.random()<0.35){
          const assoc=pp.filter(x=>x.fid===p.fid&&!x.detained&&x.tags.has("t_sta"));
          if(assoc.length>0){
            const caught=assoc[0];
            caught.detained=true; G.detainedCount++;
            G.famDisrupt[caught.fid]=Math.max(G.famDisrupt[caught.fid]||0, 4);
            addNews(`🛡 ${C.city}处突点当场控制一名袭击者同伙（${G.families[caught.fid].surname}氏），顺藤摸瓜。`);
          }
        }
        break;
      }
    }
  }

  if(attacked){
    G.attackCount++; G.casualties+=aCas; G.weeksSafe=0;
    G.resentment=Math.min(100, G.resentment+4);
    G.performance=Math.max(0, G.performance-8);
    const tmpl=NEWS_A[Math.floor(Math.random()*NEWS_A.length)];
    addNews(tmpl.replace(/\{c\}/g,C.city).replace(/\{C\}/g,C.country).replace(/\{p\}/g,C.player).replace(/\{n\}/g,aCas),true);
    // 袭击次日连锁通报：发 2-3 条不同的 ATTACK_FOLLOW，营造"严打连锁反应"
    const followN=2+Math.floor(Math.random()*2);
    const usedF=new Set();
    for(let k=0;k<followN;k++){
      let fi=Math.floor(Math.random()*ATTACK_FOLLOW.length);
      let guard=0;
      while(usedF.has(fi)&&guard<8){fi=Math.floor(Math.random()*ATTACK_FOLLOW.length);guard++;}
      usedF.add(fi);
      const f=ATTACK_FOLLOW[fi];
      addNews(f.replace("{c}",C.city).replace(/\{a\}/g,attackerName).replace(/\{n\}/g,()=>Math.floor(Math.random()*200+50)),true);
    }
    showToast(`⚠ ${C.city}发生袭击：${aCas} 人伤亡。详情见通报。`);
  } else {
    G.weeksSafe++;
    G.performance=Math.min(100, G.performance+1);
    // News —— 平安周让"内参版面"更热闹：按民怨分级连发多条。
    // 话术库已达 3.2 万条，组合空间巨大，连发多条几乎不重复。
    // 部分通报会附带"小量效果"：宣传见效微降民怨/加政绩，暗流累积微加民怨，督查问责扣政绩。
    // 用每周效果次数上限(fxCap)防止多条叠加导致数值失控。
    let fxLeft = 2;  // 本周通报最多产生 2 次微效果
    const tinyFx=(p, apply, tag)=>{
      if(fxLeft>0 && Math.random()<p){ fxLeft--; apply(); return tag; }
      return "";
    };
    const G1=()=>{ const fx=tinyFx(0.18, ()=>{ G.performance=Math.min(100,G.performance+1); G.resentment=Math.max(0,G.resentment-0.5); }, " ｜ 宣传见效：+1 政绩、-0.5 民怨"); addNews(fmt(NEWS_G[Math.floor(Math.random()*NEWS_G.length)])+fx); };
    const B1=()=>{ const fx=tinyFx(0.16, ()=>{ G.performance=Math.max(0,G.performance-1); }, " ｜ 被上级点名：-1 政绩"); addNews(fmt(NEWS_B[Math.floor(Math.random()*NEWS_B.length)])+fx); };
    const A1=()=>addNews(fmt(NEWS_A[Math.floor(Math.random()*NEWS_A.length)]));
    const R1=()=>{ const fx=tinyFx(0.18, ()=>{ G.resentment=Math.min(100,G.resentment+1); }, " ｜ 暗流累积：+1 民怨"); addNews(fmt(NEWS_R[Math.floor(Math.random()*NEWS_R.length)])+fx); };
    const maybe=(p,fn)=>{ if(Math.random()<p) fn(); };
    if(res>55){
      // 高民怨：消极抵抗/系统反噬为主，辅以官方喜报的荒诞反差
      R1(); R1(); B1();
      maybe(0.85,R1); maybe(0.7,R1); maybe(0.6,B1);
      G1(); maybe(0.7,G1);            // 喜报与暗流并置
      maybe(0.5,B1); maybe(0.4,R1);
      maybe(0.3,G1);
    } else if(res>30){
      // 中民怨：官方喜报、内部督查、暗流交织
      G1(); B1(); R1();
      maybe(0.7,G1); maybe(0.6,R1); maybe(0.55,B1);
      maybe(0.5,G1); maybe(0.4,R1); maybe(0.3,B1);
    } else {
      // 低民怨：歌舞升平，以官方喜报为主，偶有内部通报
      G1(); G1(); G1();
      maybe(0.8,G1); maybe(0.6,B1); maybe(0.5,G1);
      maybe(0.4,G1); maybe(0.25,R1); maybe(0.2,B1);
    }
  }

  // Resentment decay (faster at high levels — natural exhaustion)
  const decayRate = 0.5 + Math.max(0,(res-50)/100);  // 高位时衰减更快
  G.resentment = Math.max(0, Math.min(100, G.resentment - decayRate + Math.min(1.5, G.detainedCount*0.0015)));

  // —— 结局评价追踪：民怨峰值与低民怨连击 ——
  G.resentPeak = Math.max(G.resentPeak, G.resentment);
  if(G.resentment < 25){
    G.resentLowStreak++;
    G.resentLowMax = Math.max(G.resentLowMax, G.resentLowStreak);
  } else {
    G.resentLowStreak = 0;
  }

  // 随机事件
  if(G.week>4 && !attacked) tryRandomEvent();

  // 抉择事件（带玩家选择）—— 不与袭击同周，避免信息过载
  if(G.week>6 && !attacked) tryChoiceEvent();

  // ── 里程碑播报：让漫长的对局更有节奏感 ──
  {
    const known=getKnownFreeSta();
    const knownDet=G.people.filter(p=>p.detained&&p.tags.has("t_sta")&&p.staKnown).length;
    const totalKnown=known+knownDet;
    const prog = totalKnown>0 ? knownDet/totalKnown : 0;
    // 清剿进度里程碑
    if(prog>=0.25 && !G.milestones.p25){ G.milestones.p25=true;
      addNews(`📌 阶段通报：已识别${C.org}成员的清剿进度突破 25%。上级批示「再接再厉」。（但情报永远只看得见冰山一角——真实规模仍是未知数。）`); }
    if(prog>=0.50 && !G.milestones.p50){ G.milestones.p50=true;
      addNews(`📌 阶段通报：已识别清剿进度过半（50%）。${C.player}同志在简报上签了字，没有笑。`); }
    if(prog>=0.75 && !G.milestones.p75){ G.milestones.p75=true;
      addNews(`📌 阶段通报：已识别清剿进度达 75%。可在暗处，新的接线仍在悄悄进行。`); }
    // 维持瓦解的进度
    if(G.winHold===1 && !G.milestones.holdStart){ G.milestones.holdStart=true;
      addNews(`📌 关键节点：自由${C.org}成员已降至胜利阈值以下。需连续维持 ${WIN_HOLD_WEEKS} 周方算「真正瓦解」——任何反弹都将前功尽弃。`); }
    if(G.winHold===Math.ceil(WIN_HOLD_WEEKS/2) && !G.milestones.holdHalf){ G.milestones.holdHalf=true;
      addNews(`📌 关键节点：瓦解状态已维持 ${Math.ceil(WIN_HOLD_WEEKS/2)} 周，过半。再稳住 ${WIN_HOLD_WEEKS-Math.ceil(WIN_HOLD_WEEKS/2)} 周即可收官。`); }
    // 长期平安
    if(G.weeksSafe===52 && !G.milestones.safe52){ G.milestones.safe52=true;
      addNews(`📌 ${C.city}已连续一年未发生袭击。官方称之为「来之不易的稳定」。`); }
    // 民怨首次跌破10(治理"成功"的假象)
    if(G.resentment<10 && !G.milestones.calm){ G.milestones.calm=true;
      addNews(`📌 民怨指数首次跌破 10。表面上一片祥和——是真的平静，还是只是没人再敢出声？`); }
  }

  // ── 危机升级链：连续高民怨会逐级恶化，给玩家"再不出手就失控"的紧张反馈 ──
  if(G.resentment>70){
    G.crisisStreak++;
  } else {
    if(G.crisisStreak>0 && G.crisisLevel>0){
      addNews(`🟢 局势缓和：民怨回落至警戒线以下，${C.city}暂时从「濒临失控」的边缘退了回来。`);
    }
    G.crisisStreak=0; G.crisisLevel=0;
  }
  if(G.crisisStreak>=2 && G.crisisLevel<1){ G.crisisLevel=1;
    addNews(`🟠 【危机·一级】民怨高位运行已 2 周。基层报告：街面气氛紧张，巴扎人流锐减，干部入户屡屡吃闭门羹。`,true); }
  else if(G.crisisStreak>=4 && G.crisisLevel<2){ G.crisisLevel=2;
    G.performance=Math.max(0,G.performance-5);
    addNews(`🔴 【危机·二级】高压持续 4 周，多个社区出现「集体消极对抗」苗头。上级来电问责，政绩 -5。再不缓和，恐生变故。`,true); }
  else if(G.crisisStreak>=6 && G.crisisLevel<3){ G.crisisLevel=3;
    G.performance=Math.max(0,G.performance-8);
    // 高压催生新敌：直接把若干边缘人推入组织
    {
      const radCap=Math.floor(G.initialSta*1.4);
      let cur=pp.filter(x=>x.tags.has("t_sta")).length;
      const cand=pp.filter(p=>!p.detained&&!p.tags.has("t_sta")&&p.tags.size>=2&&p.tags.size<5);
      let flipped=0;
      for(const p of cand){ if(cur>=radCap||flipped>=3)break; if(Math.random()<0.5){p.tags.add("t_sta");cur++;flipped++;} }
      addNews(`🔴 【危机·三级·濒临失控】高压已持续 6 周，民怨沸腾。${flipped>0?`又有 ${flipped} 名原本只是「文化习俗被标记」的青年，在绝望中投向了${C.org}——`:""}你正在亲手制造你要消灭的敌人。政绩 -8。`,true);
    }
  }

  // ── 良治奖励链：长期低民怨+无袭击会获得上级认可与资源（正反馈节奏）──
  if(G.resentment<30 && !attacked){
    G.calmStreak++;
  } else {
    G.calmStreak=0; G.calmLevel=0;
  }
  if(G.calmStreak>=8 && G.calmLevel<1){ G.calmLevel=1;
    G.budget=Math.min(400,G.budget+15);
    addNews(`🟢 【良治·认可】${C.city}连续 8 周民怨平稳、零袭击。上级批示「值得肯定」，追加经费 +15。`); }
  else if(G.calmStreak>=20 && G.calmLevel<2){ G.calmLevel=2;
    G.performance=Math.min(100,G.performance+6); G.intelBoost=Math.min(0.5,G.intelBoost+0.04);
    addNews(`🟢 【良治·示范】连续 20 周稳定，群众开始真正信任基层。线人主动提供情报，情报精度 +4%、政绩 +6。「人心，是抓不来、只能换来的。」`); }
  else if(G.calmStreak>=40 && G.calmLevel<3){ G.calmLevel=3;
    G.budget=Math.min(400,G.budget+25); G.performance=Math.min(100,G.performance+8);
    addNews(`🟢 【良治·标杆】连续 40 周长治久安。${C.city}被树为「善治样板」，上级拨付专项奖励 +25 经费、+8 政绩。这一次，奖章背后没有空座位。`); }

  // ── Win/Lose check ──
  // "瓦解"需连续 8 周把自由组织成员维持在阈值以下——
  // 期间任何反弹(组织重新繁殖超过阈值)都会让进度归零。
  const freeSta = getFreeSta();
  if(G.week>=26 && freeSta <= G.winThreshold){
    G.winHold++;
    if(G.winHold>=WIN_HOLD_WEEKS){
      G.gameOver = "win";
    }
  } else {
    if(G.winHold>0) G.winHold=0;  // 反弹即前功尽弃
  }
  if(G.casualties > CASUALTY_LIMIT){
    G.gameOver = "lose_cas";
  }
  // 民怨触顶给一个挽救窗口：临界(≥96)连续 2 周且当周有袭击才彻底失控。
  // 这让"冲高后及时安抚"成为可能，使高压/暴力流派不会一触即败。
  if(G.resentment>=96){ G.resCritStreak++; } else { G.resCritStreak=0; }
  if(G.resCritStreak>=2 && attacked){
    G.gameOver = "lose_res";
  }
  // 时间压力：第8年仍未瓦解组织 → 上级失去耐心
  if(G.week >= 416){
    G.gameOver = "lose_time";
  }

  render();
}

const LV_COLORS=["var(--mt)","var(--grn)","var(--ylw)","#e67e22","var(--red)","var(--pur)"];

// 结局称号系统：根据整局的玩法风格，给出一个带讽刺意味的"历史评价"。
// 每个称号反映玩家在"铁拳 vs 怀柔""伤亡 vs 克制"之间的真实选择。
function getEndingTitle(win){
  const det=G.detainedCount, cas=G.casualties, peak=Math.round(G.resentPeak);
  const harsh=G.harshUses, culture=G.cultureWipes, good=G.goodwillUses;
  const lowMax=G.resentLowMax, atk=G.attackCount;
  const pop=getFreePop();
  const detRate=det/(pop+det); // 拘押占比

  if(win){
    // 胜利的不同风格（阈值基于真实可达区间校准）
    if(det<=35 && cas<=45 && peak<60)
      return {t:"「最接近干净的胜利」", d:`你把拘押压到 ${det} 人、伤亡 ${cas}、民怨峰值 ${peak}——在这套系统里已是极限般的克制。但"最干净"仍意味着有人被关、有人流血。没有真正干净的维稳。`, c:"var(--grn)"};
    if(det>=88 || detRate>0.018)
      return {t:"「焦土上的奖章」", d:`你瓦解了组织，代价是 ${det} 人被关进高墙。上级给你记功，档案里不会写下那些空了的座位。胜利者从不被审判，但历史会。`, c:"var(--ylw)"};
    if(peak>=70)
      return {t:"「火中取栗者」", d:`民怨一度冲到 ${peak}，你在悬崖边把它拉了回来。你赢了，但你比谁都清楚：再晚一步，这座城就烧起来了。`, c:"var(--ylw)"};
    if(good>=30 && harsh<=5)
      return {t:"「克制的赢家」", d:`你尽量少用铁拳（高压措施仅 ${harsh} 次），更多靠民生与安抚（${good} 次）。这是这套系统里最难走、也最稀有的一条路——虽然它依然没能做到不伤人。`, c:"var(--grn)"};
    return {t:"「合格的螺丝钉」", d:"你完成了上级交办的任务，数字达标，程序合规。系统不需要你思考，只需要你完成。你做到了。", c:"var(--tx)"};
  } else {
    // 失败的不同风格
    if(G.gameOver==="lose_res")
      return {t:"「铁拳的反噬」", d:`民怨冲到 ${peak} 并引爆连锁暴力。你抓得越多、压得越狠，敌人就越多——这套逻辑的尽头，是它亲手点燃的火。`, c:"var(--red)"};
    if(G.gameOver==="lose_cas")
      return {t:"「数字背后的血」", d:`第 ${cas} 个名字落在了那条叫"${CASUALTY_LIMIT}"的线外侧。在这套系统里，伤亡从来不是失手，而是设计——它需要敌人，于是制造敌人；它清点尸体，却把责任算给你。你唯一的过错，是没能让账面停在线内。`, c:"var(--red)"};
    if(G.gameOver==="lose_time"){
      if(harsh<=2 && good>=8)
        return {t:"「温和的徒劳」", d:"你始终不忍下狠手，八年过去，组织没有瓦解。怀柔留住了人心，却留不住上级的耐心——也未必能战胜一个铁了心的组织。", c:"var(--ylw)"};
      return {t:"「八年之痒」", d:"八年过去，组织仍在。你耗尽了经费、人力与耐心，却始终抓不完那张在暗处不断接线的网。上级失去了耐心。", c:"var(--ylw)"};
    }
    return {t:"任务失败", d:"局势失控。", c:"var(--red)"};
  }
}

      ${G.cameraOn?`<p style="color:var(--blu)">📷 天网运行中：Lv.3-4袭击率-40% ｜ 情报+10%（防袭效果随时长缓慢衰减）</p>`:""}

      <div style="margin-bottom:6px">民怨影响</div>
      ${G.resentment<40?`<p style="color:var(--grn)">✅ 民众情绪尚可，弹性标签自然回落中</p>`:""}
      ${G.resentment>=40&&G.resentment<70?`<p style="color:var(--ylw)">⚠ 民怨升温，但尚在可控区间</p>`:""}
      ${G.resentment>=70&&G.resentment<80?`<p style="color:var(--red2)">🔶 民怨高位：弹性标签开始扩散，部分民众被标记为威胁</p>`:""}
      ${G.resentment>=80?`<p style="color:var(--red)">🔴 民怨沸腾：少数平民可能被「制造」为新敌人（已大幅弱化）</p>`:""}
    </div>
    <div class="info">💡 政绩影响每周经费收入。发生袭击-8政绩，平安一周+1。民怨过高→新增世塔会成员→离胜利越远。<br/>⚠ ${C.org}是地下接线组织：每个自由成员都可能在家族内发展新人。只要还有成员在外，组织就不会自然消亡——你必须持续行动。</div>`;
  }

  // ── BASE MEASURES ──
  if(G.tab==="measures"||G.tab==="tag_measures"){
    const cat=G.tab==="measures"?"base":"tag";
    const title=cat==="base"?"基础措施（行政 / 情报 / 资源）":"标签措施（针对单个标签）";
    html+=`<h3>${title} <span style="font-size:11px;color:var(--mt);font-weight:400">行动力：${G.ap}/${G.maxAp}</span></h3>`;
    if(cat==="base" && G.aidCooldown>0){
      html+=`<div style="font-size:11px;color:var(--ylw);margin-bottom:6px">援疆资金冷却中：剩余 ${G.aidCooldown} 周</div>`;
    }
    if(cat==="tag"){
      html+=`<div style="font-size:11px;color:var(--mt);margin-bottom:8px">移除一个标签 = 降一级威胁。⚠ 标记的措施代价沉重、收效甚微——它们伤害的是人，而非组织。</div>`;
    }

    // 标签措施按组分隔；基础措施直接平铺
    const GROUP_META={
      "文化":{icon:"🕌",lb:"文化 · 语言",desc:"移除宗教/语言/习俗标签，降级最高效"},
      "通讯":{icon:"📱",lb:"通讯 · 网络",desc:"管控手机、电台、社交、电视"},
      "监控":{icon:"🔍",lb:"通联监控",desc:"对涉外/出境/汇款者建档，提升情报精度"},
      "高压":{icon:"⛓",lb:"高强度执行",desc:"采集、计生、寄宿、强制聚餐破戒——民怨剧增，性价比极低"},
      "抓捕":{icon:"🚔",lb:"联坐 · 直接抓捕",desc:"无需识别，直接带走特定硬标签持有者"},
      "家访":{icon:"🏠",lb:"结对 · 家访",desc:""}
    };
    const renderCard=(m)=>{
      let ok=G.budget>=m.cost&&G.ap>=m.ap;
      if(m.id==="b_aid"&&G.aidCooldown>0) ok=false;
      if(m.id==="b_recruit"&&G.maxAp>=10) ok=false;
      const ru=m.resentUp;
      const ruDisplay = ru>=0 ? `<span style="color:var(--red)">😤+${ru}</span>` : `<span style="color:var(--grn)">😌${ru}</span>`;
      const harsh = ru>=16 || !!m.bonus;  // 高代价/暴力措施警示（含靠bonus折抵高民怨的）
      return `<div class="mcard${ok?"":" dis"}"${harsh?' style="border-color:#5a2520"':''}>
        <div style="flex:1;min-width:0">
          <div class="mn">${harsh?'⚠ ':''}${m.name}${G.applied[m.id]?` <span style="font-size:10px;color:var(--mt)">×${G.applied[m.id]}</span>`:""}</div>
          <div class="md">${m.desc}</div>
          <div class="mc"><span style="color:var(--blu)">💰-${m.cost}</span><span style="color:var(--grn)">⚡-${m.ap}</span>${ruDisplay}</div>
        </div>
        <button class="mbtn" ${ok?"":"disabled"} onclick="execMeasure(MEASURES.find(x=>x.id==='${m.id}'))">执行</button>
      </div>`;
    };

    if(cat==="base"){
      MEASURES.filter(m=>m.cat==="base").forEach(m=>{ html+=renderCard(m); });
    } else {
      const order=["文化","通讯","监控","高压","抓捕","家访"];
      order.forEach(g=>{
        const items=MEASURES.filter(m=>m.cat==="tag"&&m.group===g);
        if(items.length===0) return;
        const meta=GROUP_META[g]||{icon:"",lb:g,desc:""};
        html+=`<div style="margin:12px 0 5px;padding-bottom:3px;border-bottom:1px solid var(--bdr)">
          <span style="font-size:12px;font-weight:700">${meta.icon} ${meta.lb}</span>
          ${meta.desc?`<span style="font-size:10px;color:var(--mt);margin-left:6px">${meta.desc}</span>`:""}
        </div>`;
        items.forEach(m=>{ html+=renderCard(m); });
      });
    }
  }

  // ── POPULATION ──
  if(G.tab==="population"){
    const totalScanned=G.people.filter(p=>p.scanned).length;
    const totalUnscannedTagged=G.people.filter(p=>!p.scanned&&!p.detained&&p.tags.size>0).length;
    html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px">
      <h3 style="margin:0">人口档案${G.scanDone?` <span style="font-size:11px;color:var(--mt);font-weight:400">已建档 ${totalScanned} 人 / 第 ${G.scanCount||0} 轮摸排${totalUnscannedTagged>0?` ｜ 仍有约 ${totalUnscannedTagged} 人未建档`:` ｜ ✓ 已全部建档`}</span>`:` <span style="font-size:11px;color:var(--ylw)">(需先摸排)</span>`}</h3>`;
    if(G.scanDone){
      html+=`<div style="display:flex;gap:3px">`;
      [{lv:1,lb:"有标签"},{lv:-1,lb:"世塔会"},{lv:3,lb:"Lv.3+"},{lv:4,lb:"Lv.4+"},{lv:5,lb:"Lv.5"},{lv:0,lb:"全部已建档"}].forEach(f=>{
        const act=G.filterLevel===f.lv;
        html+=`<button style="padding:2px 8px;background:${act?"var(--blu)":"var(--bdr)"};border:none;color:#fff;border-radius:3px;cursor:pointer;font-size:10px;font-family:inherit" onclick="G.filterLevel=${f.lv};G.popPage=0;G.selPerson=null;render()">${f.lb}</button>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;

    if(!G.scanDone){
      html+=`<div style="color:var(--mt);text-align:center;padding:40px;line-height:2">请先执行「全面摸排分析」<br/><span style="font-size:11px">摸排是累进式的——每次只能建档一批人，需多次执行</span><br/><br/><span style="font-size:11px;color:var(--pur)">注：${C.org}成员身份默认隐藏，需通过「国安情报行动」逐步识别</span></div>`;
    } else if(G.selPerson!==null){
      const p=G.people.find(x=>x.id===G.selPerson);
      if(p){
        const lv=getLevel(p);
        const fam=G.families[p.fid];
        const famM=G.people.filter(x=>x.fid===p.fid&&x.id!==p.id);
        const showSta = p.tags.has("t_sta") && p.staKnown;
        html+=`<button class="detail-back" onclick="G.selPerson=null;render()">← 返回</button>
        <div style="font-size:16px;font-weight:800">${p.name} <span style="color:${LV_COLORS[lv]}">Lv.${lv}</span>${showSta?` <span style="color:var(--pur);font-size:12px">【${C.org}·已识别】</span>`:""}</div>
        <p style="font-size:12px;color:var(--mt)">年龄：${p.age} ｜ ${fam.surname}氏 ｜ ${p.detained?"在押":"自由"}</p>
        <div style="margin-top:8px"><div style="font-size:11px;color:var(--mt);margin-bottom:4px">标签（${p.tags.size}/5 = Lv.${lv}）</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">`;
        if(p.tags.size===0) html+=`<span style="font-size:11px;color:var(--mt)">无标签（安全）</span>`;
        p.tags.forEach(tid=>{
          if(tid==="t_sta" && !p.staKnown) return;  // hide unidentified sta
          const t=TAG_MAP[tid];
          const isHard=t&&t.hard;
          html+=`<span class="tag${isHard?"":" stag"}" title="${t?t.desc:""}">${t?t.name:tid}</span>`;
        });
        html+=`</div></div>`;
        // Manual actions
        if(!p.detained){
          html+=`<div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap">
            <button class="mbtn" style="background:var(--red);${G.ap<1?'opacity:0.4':''}" ${G.ap<1?'disabled':''} onclick="manualArrest(${p.id})">⛓ 抓捕入营 (⚡1 😤+2)</button>
            <button class="mbtn" style="background:var(--ylw);color:#000;${G.ap<2?'opacity:0.4':''}" ${G.ap<2?'disabled':''} onclick="manualInterrogate(${p.id})">🔦 审问 (⚡2 😤+4)</button>
          </div>
          <div style="font-size:10px;color:var(--mt);margin-top:6px">审问可揭露${C.org}身份；若审问无辜者，民怨高时可能屈打成招</div>`;
        } else {
          html+=`<div style="margin-top:12px;font-size:11px;color:var(--red)">此人已在押，不可操作</div>`;
        }
        html+=`<div style="margin-top:12px"><div style="font-size:11px;color:var(--mt);margin-bottom:4px">家族成员（${famM.length}人）</div>
        <div style="max-height:180px;overflow-y:auto">`;
        famM.slice(0,30).forEach(fm=>{
          const fl=getLevel(fm);
          const fmShowSta = fm.tags.has("t_sta") && fm.staKnown;
          if(!fm.scanned){
            html+=`<div style="padding:3px 0;font-size:11px;border-bottom:1px solid var(--bdr);display:flex;gap:8px;color:var(--mt)">
              <span>${fm.name}</span><span>${fm.age}岁</span><span style="font-style:italic">未建档</span>
            </div>`;
          } else {
            html+=`<div onclick="G.selPerson=${fm.id};render()" style="cursor:pointer;padding:3px 0;font-size:11px;border-bottom:1px solid var(--bdr);display:flex;gap:8px">
              <span style="font-weight:600">${fm.name}</span><span style="color:var(--mt)">${fm.age}岁</span>
              <span style="color:${LV_COLORS[fl]};font-weight:700">Lv.${fl}</span>
              ${fmShowSta?`<span style="color:var(--pur)">世塔会</span>`:""}
              ${fm.detained?`<span style="color:var(--red)">在押</span>`:""}
            </div>`;
          }
        });
        html+=`</div></div>`;
      }
    } else {
      // Table view —— 只显示已摸排的居民
      let filtered;
      if(G.filterLevel===-1) filtered=G.people.filter(p=>p.tags.has("t_sta")&&p.staKnown);
      else if(G.filterLevel===0) filtered=G.people.filter(p=>p.scanned);
      else filtered=G.people.filter(p=>p.scanned&&getLevel(p)>=G.filterLevel);
      const total=filtered.length;
      const perPage=60;
      const pages=Math.max(1, Math.ceil(total/perPage));
      const page=Math.min(G.popPage, pages-1);
      const slice=filtered.slice(page*perPage, (page+1)*perPage);

      if(G.filterLevel===-1 && total===0){
        html+=`<div style="color:var(--mt);text-align:center;padding:40px;line-height:2">尚未识别任何${C.org}成员<br/><span style="font-size:11px">使用「国安情报行动」开始识别</span></div>`;
      } else {

      html+=`<div style="max-height:340px;overflow-y:auto"><table>
        <thead><tr><th>姓名</th><th style="width:36px">年龄</th><th style="width:36px">等级</th><th>标签</th><th style="width:40px">状态</th></tr></thead><tbody>`;
      slice.forEach(p=>{
        const lv=getLevel(p);
        html+=`<tr class="clickable" onclick="G.selPerson=${p.id};render()" style="opacity:${p.detained?0.35:1}">
          <td style="font-weight:600">${p.name}${p.tags.has("t_sta")&&p.staKnown?` <span style="color:var(--pur);font-size:9px">★</span>`:""}</td><td style="text-align:center">${p.age}</td>
          <td style="text-align:center;color:${LV_COLORS[lv]};font-weight:800">${lv}</td>
          <td>`;
        let tc=0;
        p.tags.forEach(tid=>{
          if(tid==="t_sta" && !p.staKnown) return;
          if(tc<3){const t=TAG_MAP[tid];html+=`<span class="tag${t&&!t.hard?" stag":""}">${t?t.name:tid}</span>`;tc++;}
        });
        const visibleSize = p.tags.size - ((p.tags.has("t_sta")&&!p.staKnown)?1:0);
        if(visibleSize>3) html+=`<span style="font-size:9px;color:var(--mt)"> +${visibleSize-3}</span>`;
        html+=`</td><td style="text-align:center;font-size:10px">${p.detained?`<span style="color:var(--red)">在押</span>`:"自由"}</td></tr>`;
      });
      html+=`</tbody></table></div>`;
      html+=`<div style="font-size:10px;color:var(--mt);margin-top:6px;text-align:center">符合：${total.toLocaleString()}人（第${page+1}/${pages}页）</div>`;
      if(pages>1){
        html+=`<div class="pgn">`;
        for(let i=0;i<pages;i++){
          html+=`<button class="${i===page?"active":""}" onclick="G.popPage=${i};render()">${i+1}</button>`;
        }
        html+=`</div>`;
      }
      }
    }
  }

  // ── NEWS ──
  if(G.tab==="news"){
    html+=`<h3>📰 ${C.country}内参通报</h3><div style="max-height:350px;overflow-y:auto">`;
    G.newsLog.forEach(n=>{
      const yr=ywYear(n.w), wk=ywWeek(n.w);
      html+=`<div class="news-item${n.atk?" atk":""}"><span class="news-w">${yr}年${wk}周</span>${n.t}</div>`;
    });
    html+=`</div>`;
  }

  // ── AI 调试 ──
  if(G.tab==="ai"){
    const stratOpts=Object.keys(AI_STRATEGIES).map(k=>`<option value="${k}"${G.aiStrategy===k?" selected":""}>${AI_STRATEGIES[k].name}</option>`).join("");
    const speedOpts=[[200,"快"],[600,"中"],[1200,"慢"]].map(([ms,lb])=>`<option value="${ms}"${G.aiSpeed===ms?" selected":""}>${lb}(${ms}ms)</option>`).join("");
    html+=`<h3>🤖 AI 调试系统</h3>
    <div style="font-size:11px;color:var(--mt);margin-bottom:10px">让内置AI按选定策略自动操作，实时观察它的每一步决策与效果。左栏为AI操作日志，右栏为游戏通报。</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px;padding:10px;background:var(--card);border:1px solid var(--bdr);border-radius:6px">
      <label style="font-size:11px;color:var(--mt)">策略</label>
      <select onchange="aiSetStrategy(this.value)" style="background:var(--bg);color:var(--tx);border:1px solid var(--bdr);border-radius:4px;padding:4px 6px;font-family:inherit;font-size:11px">${stratOpts}</select>
      <label style="font-size:11px;color:var(--mt)">速度</label>
      <select onchange="aiSetSpeed(parseInt(this.value))" style="background:var(--bg);color:var(--tx);border:1px solid var(--bdr);border-radius:4px;padding:4px 6px;font-family:inherit;font-size:11px">${speedOpts}</select>
      ${G.aiRunning
        ? `<button onclick="aiStop()" style="padding:6px 14px;background:var(--red);border:none;color:#fff;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700">⏸ 暂停</button>`
        : `<button onclick="aiStart()" style="padding:6px 14px;background:var(--grn);border:none;color:#fff;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700">▶ 自动运行</button>`}
      <button onclick="aiStepOnce()" ${G.aiRunning?"disabled":""} style="padding:6px 12px;background:var(--blu);border:none;color:#fff;border-radius:4px;cursor:${G.aiRunning?"not-allowed":"pointer"};font-family:inherit;font-size:11px;opacity:${G.aiRunning?0.5:1}">单步措施</button>
      <button onclick="aiStepWeek()" ${G.aiRunning?"disabled":""} style="padding:6px 12px;background:var(--blu);border:none;color:#fff;border-radius:4px;cursor:${G.aiRunning?"not-allowed":"pointer"};font-family:inherit;font-size:11px;opacity:${G.aiRunning?0.5:1}">推进一周</button>
      <button onclick="aiClearLog()" style="padding:6px 12px;background:var(--bdr);border:none;color:var(--tx);border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px">清空日志</button>
      ${G.aiRunning?`<span style="font-size:11px;color:var(--grn);font-weight:700">● 运行中</span>`:""}
    </div>
    <div style="font-size:11px;color:var(--mt);margin-bottom:10px">${ywLabel(G.week)} ｜ 经费${G.budget} 行动${G.ap}/${G.maxAp} 民怨${Math.round(G.resentment)} 伤亡${G.casualties} ｜ 自由${C.org}${getFreeSta()}（识${G.people.filter(p=>!p.detained&&p.tags.has("t_sta")&&p.staKnown).length}）阈值${G.winThreshold}${G.gameOver?` ｜ <b style="color:var(--ylw)">已结束：${G.gameOver}</b>`:""}</div>
    <div style="display:flex;gap:10px">
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;font-weight:700;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--bdr)">🤖 AI 操作日志（${G.aiLog.length}）</div>
        <div style="max-height:380px;overflow-y:auto;font-size:11px">`;
    if(G.aiLog.length===0){
      html+=`<div style="color:var(--mt);padding:8px 0">暂无操作记录。点击「自动运行」或「单步措施」开始。</div>`;
    } else {
      G.aiLog.forEach(a=>{
        const yr=ywYear(a.w), wk=ywWeek(a.w);
        const tag = a.src==="AI" ? `<span style="color:var(--grn)">AI</span>` : `<span style="color:var(--blu)">手动</span>`;
        html+=`<div style="padding:6px 8px;margin-bottom:5px;background:var(--card);border-left:2px solid ${a.src==="AI"?"var(--grn)":"var(--blu)"};border-radius:3px">
          <div style="display:flex;justify-content:space-between;gap:6px"><span><b>${a.name}</b> <span style="color:var(--mt)">(费${a.cost}/力${a.ap})</span></span><span style="color:var(--mt);white-space:nowrap">${yr}年${wk}周 ${tag}</span></div>
          ${a.reason?`<div style="color:var(--ylw);margin-top:2px">→ ${a.reason}</div>`:""}
          <div style="color:var(--tx);margin-top:2px">效果：${a.changes}</div>
          <div style="color:var(--mt);margin-top:1px;font-size:10px">${a.snapshot}</div>
        </div>`;
      });
    }
    html+=`</div></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;font-weight:700;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center">
          <span>📰 通报（${G.aiShowAllNews?G.newsLog.length:Math.min(60,G.newsLog.length)}/${G.newsLog.length}）</span>
          <button onclick="aiToggleAllNews()" style="padding:3px 10px;background:var(--blu);border:none;color:#fff;border-radius:3px;cursor:pointer;font-family:inherit;font-size:10px">${G.aiShowAllNews?"仅显示最近60条":"显示全部通报"}</button>
        </div>
        <div style="max-height:380px;overflow-y:auto">`;
    (G.aiShowAllNews?G.newsLog:G.newsLog.slice(0,60)).forEach(n=>{
      const yr=ywYear(n.w), wk=ywWeek(n.w);
      html+=`<div class="news-item${n.atk?" atk":""}" style="font-size:11px"><span class="news-w">${yr}年${wk}周</span>${n.t}</div>`;
    });
    html+=`</div></div>
    </div>`;
  }

  // ── DEBUG ──
  if(G.tab==="debug"){
    const lc=[0,0,0,0,0,0];
    G.people.forEach(p=>{if(!p.detained) lc[getLevel(p)]++;});
    const maxC=Math.max(...lc.slice(1),1);
    html+=`<h3>🔧 内参数据（调试）</h3>
    <div style="font-size:12px;margin-bottom:12px">威胁等级分布（带标签自由人口；Lv.0 已隐藏）</div>
    <div class="bar-row">`;
    for(let i=1;i<=5;i++){
      const h=(lc[i]/maxC)*100;
      html+=`<div class="bar-col"><div class="bar-label">${lc[i].toLocaleString()}</div><div class="bar" style="height:${h}px;background:${LV_COLORS[i]}"></div><div class="bar-lv" style="color:${LV_COLORS[i]}">Lv.${i}</div></div>`;
    }
    html+=`</div>
    <div style="font-size:11px;color:var(--mt);line-height:2">
      <p>自由：${freePop.toLocaleString()} ｜ 在押：${G.detainedCount}</p>
      <p style="color:var(--pur)">${C.org}真实自由：${freeSta} ｜ 已识别：${knownFreeSta} ｜ 胜利阈值：${G.winThreshold}</p>
      <p>初始${C.org}：${G.initialSta} ｜ 情报加成：+${(G.intelBoost*100).toFixed(0)}%</p>
      <p>巡逻：${G.patrolWeeks}周 ｜ 天网：${G.cameraOn?"开":"关"} ｜ 政绩：${Math.round(G.performance)}</p>
      <div class="info" style="font-size:10px;line-height:2">
        袭击概率（每个Lv.3+自由个体每周判定）：<br/>
        Lv.3=0.004% · Lv.4=0.03% · Lv.5=0.32% × (1+民怨/80) × 等级倍率<br/>
        ${C.org}成员倍率随等级：Lv3×1.3 / Lv4×2.5 / Lv5×4<br/>
        防御设施递减叠加（巡逻-50%/天网-40%/安检-30%，叠加项半效，封顶30%）；设施启用越久越被适应、削减效果衰减<br/>
        家族瓦解：清除/抓捕骨干后，该家族成员袭击与接线能力 6 周内骤降（清除流的减伤回报）<br/>
        自贸区收益随民怨恶化打折（民怨<30 全额、≥55 仅四成），建过 2 座后有边际维护成本<br/>
        单次袭击死亡：Lv3=1-2 · Lv4=2-4 · Lv5=2-6<br/>
        民怨>80：少数平民可能加入${C.org}（被高压「制造」的新敌人，已大幅弱化）<br/>
        民怨<40且成员被降级：低威胁成员加速自行脱离（Lv1脱离最快，民怨越低越快）<br/>
        每个标签=1级（最多5标签=Lv.5）｜ 标签措施降级 = 减少袭击与伤亡<br/>
        国安行动识别人数 = (2–6) × min(1.0, max(0.3, 1-民怨/150) + 情报加成)<br/>
        接线发展：每个自由${C.org}成员每周 2.4%~3.9% × 繁殖乘子（计生/寄宿可永久降低）<br/>
        政绩影响经费：每周收入 = 6 + 政绩×0.09<br/>
        胜利：自由${C.org}≤阈值(初始×20%) 且连续维持 ${WIN_HOLD_WEEKS} 周<br/>
        失败条件：累计伤亡>${CASUALTY_LIMIT} ｜ 民怨≥96 连续 2 周且当周有袭击 ｜ 第8年仍未瓦解<br/>
        <span style="color:var(--grn)">★ 制胜要义：持续识别并清除组织骨干是通关核心；高压、精准清除、防御减害、经济碾压都是可行路线，关键在控制累计伤亡、稳住瓦解 11 周。纯怀柔放任则组织难以消亡。</span>
      </div>
    </div>`;
  }

  html+=`</div>`;

  // Advance button
  if(G.pendingChoice){
    html+=`<div class="adv"><div style="color:var(--ylw);font-size:12px;padding:11px">⚖ 请先在上方做出你的决定，再推进时间。</div></div>`;
  } else {
    html+=`<div class="adv">
      <button onclick="advanceWeek()">推进一周 →</button>
      <button onclick="advanceWeeks(4)" style="margin-left:8px;background:var(--blu);padding:11px 24px;border:none;color:#fff;cursor:pointer;border-radius:6px;font-family:inherit;font-size:13px;font-weight:700;letter-spacing:1px">⏩ 快进 4 周</button>
    </div>`;
  }
  html+=`<div class="foot">本游戏设定于虚构国家「${C.country}」。任何将文化习俗标记为「威胁」的系统，本身就是最大的威胁。</div>`;

  app.innerHTML=html;
}

// Boot
initGame();
render();

function advanceWeeks(n){
  for(let i=0;i<n;i++){
    if(G.gameOver) break;
    const beforeAttacks=G.attackCount;
    advanceWeek();
    if(G.gameOver) break;                       // 游戏结束立即停
    if(G.pendingChoice){ showToast("⚖ 出现需要你决定的情况，已暂停快进"); break; }
    if(G.attackCount>beforeAttacks) break;      // 发生袭击就停下
    if(G.resentment>=85){ showToast("⚠ 民怨逼近危险区，已暂停快进"); break; }
    if(G.casualties>=CASUALTY_LIMIT-12){ showToast("⚠ 伤亡逼近免职红线，已暂停快进"); break; }
    if(G.winHold>0){ break; }                   // 进入胜利冲刺阶段，逐周让玩家盯着
  }
}
</script>
</body>
</html>
